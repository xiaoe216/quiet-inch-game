<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d1510" />
  <title>一平方英寸的寂静</title>
  <style>
    :root {
      --bg: #0d1510;
      --panel: rgba(18, 32, 26, 0.92);
      --text: #e8f0ea;
      --muted: #9ab0a0;
      --accent: #6ecf8e;
      --warn: #e8a84a;
      --danger: #e07060;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }
    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100%;
      min-height: 100dvh;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: calc(8px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }
    header {
      flex-shrink: 0;
      text-align: center;
      margin-bottom: 6px;
    }
    header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.04em;
    }
    header .sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    #stage-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #0a120d;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    canvas#game {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hud {
      flex-shrink: 0;
      margin-top: 8px;
      display: grid;
      gap: 6px;
      font-size: 0.75rem;
    }
    .bar-wrap {
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.15s ease-out, background 0.2s;
    }
    .hud-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #0a120d;
      background: var(--accent);
    }
    .btn.secondary {
      background: rgba(255,255,255,0.15);
      color: var(--text);
    }
    .btn:disabled { opacity: 0.45; pointer-events: none; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      background: rgba(6, 12, 8, 0.88);
      z-index: 10;
      pointer-events: auto;
    }
    .overlay p { margin: 0.5rem 0; line-height: 1.55; font-size: 0.88rem; max-width: 320px; }
    .overlay h2 { margin: 0 0 8px; font-size: 1.05rem; }
    .hidden { display: none !important; }
    /* Level 1 forest */
    #listen {
      position: absolute;
      inset: 0;
      background: linear-gradient(165deg, #1a3d2e 0%, #0d2818 40%, #0a1a12 100%);
      z-index: 5;
      cursor: crosshair;
    }
    #listen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 80% at 50% 100%, transparent 40%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }
    .hint-pulse {
      position: absolute;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(110, 207, 142, 0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
      50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); }
    }
    .toast {
      position: absolute;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      max-width: 90%;
      padding: 12px 16px;
      background: rgba(20, 40, 30, 0.95);
      border: 1px solid rgba(110, 207, 142, 0.4);
      border-radius: 12px;
      font-size: 0.82rem;
      line-height: 1.5;
      z-index: 8;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, 12px); }
      to { opacity: 1; transform: translateX(-50%); }
    }
    #map-panel {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 38%;
      max-width: 160px;
      min-width: 120px;
      padding: 8px;
      background: var(--panel);
      border-radius: 12px 0 0 0;
      z-index: 6;
      font-size: 0.65rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-right: none;
      border-bottom: none;
    }
    #map-panel h3 { margin: 0 0 6px; font-size: 0.68rem; color: var(--muted); font-weight: 600; }
    .map-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      cursor: pointer;
      padding: 4px 2px;
      border-radius: 6px;
    }
    .map-dot:active { background: rgba(255,255,255,0.06); }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.red { background: #e07060; box-shadow: 0 0 8px #e0706088; }
    .dot.yellow { background: #e8c84a; }
    .dot.green { background: #6ecf8e; box-shadow: 0 0 8px #6ecf8e66; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.65);
    }
    .modal-card {
      width: 100%;
      max-width: 340px;
      background: #152218;
      border-radius: 16px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-card h3 { margin: 0 0 10px; font-size: 0.95rem; }
    .modal-card p { margin: 0 0 14px; font-size: 0.82rem; line-height: 1.55; color: var(--muted); }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 10px;
    }
    .cert {
      text-align: center;
      padding: 8px 0;
    }
    .cert .big { font-size: 1.4rem; color: var(--accent); margin: 8px 0; }
    #mute {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 12;
      padding: 6px 10px;
      font-size: 0.7rem;
      border-radius: 8px;
      background: rgba(0,0,0,0.35);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>一平方英寸的寂静</h1>
      <p class="sub" id="level-title">聆听森林</p>
    </header>
    <div id="stage-wrap">
      <button type="button" id="mute" aria-label="切换音效">音效：开</button>
      <canvas id="game"></canvas>
      <div id="listen" class="hidden"></div>
      <div id="map-panel" class="hidden"></div>
    </div>
    <div id="hud">
      <div class="hud-row" id="silence-row">
        <span>寂静值</span>
        <div class="bar-wrap" style="flex:1; max-width:200px;">
          <div class="bar-fill" id="silence-bar" style="width:100%; background: linear-gradient(90deg, #4a9d6a, #6ecf8e);"></div>
        </div>
        <span id="silence-pct">100%</span>
      </div>
      <div class="hud-row">
        <span>分数 <strong id="score">0</strong></span>
        <span id="extra-hud" class="muted"></span>
      </div>
      <div class="hud-row" id="start-row">
        <button type="button" class="btn" id="btn-start">开始游戏</button>
      </div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script>
(function () {
  "use strict";

  const LEVEL_TITLES = [
    "",
    "关卡一 · 寂静是一种资源",
    "关卡二 · 噪音的入侵",
    "关卡三 · 以点带面",
    "关卡四 · 全球的寂静",
    "关卡五 · 立法的重量",
    "关卡六 · 永久保护区",
  ];

  const REGIONS = [
    { id: "amz", name: "亚马逊", cost: 35 },
    { id: "alp", name: "阿尔卑斯", cost: 35 },
    { id: "yak", name: "屋久岛", cost: 35 },
    { id: "tib", name: "青藏高原", cost: 35 },
    { id: "bor", name: "北方针叶林", cost: 35 },
  ];

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const listenEl = document.getElementById("listen");
  const mapPanel = document.getElementById("map-panel");
  const levelTitleEl = document.getElementById("level-title");
  const silenceBar = document.getElementById("silence-bar");
  const silencePct = document.getElementById("silence-pct");
  const scoreEl = document.getElementById("score");
  const extraHud = document.getElementById("extra-hud");
  const btnStart = document.getElementById("btn-start");
  const startRow = document.getElementById("start-row");
  const muteBtn = document.getElementById("mute");
  const modalRoot = document.getElementById("modal-root");

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0, CX = 0, CY = 0;

  const state = {
    level: 0,
    score: 0,
    silence: 100,
    auraR: 48,
    auraMax: 0,
    regions: REGIONS.map(() => 0),
    legislationResisted: 0,
    l4AllGreenAnnounced: false,
    l4HintShown: false,
    noiseMult: 1,
    legisTimer: 0,
    nextLegislation: 0,
    l2Timer: 0,
    l2Duration: 20,
    l1Found: new Set(),
    raf: 0,
    lastT: 0,
    entities: [],
    spawnAcc: 0,
    goodSpawnAcc: 0,
    audioCtx: null,
    muted: false,
    drawPath: [],
    drawing: false,
    finaleReady: false,
  };

  function resize() {
    const wrap = document.getElementById("stage-wrap");
    const rect = wrap.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.floor(rect.width * DPR);
    H = Math.floor(rect.height * DPR);
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    CX = W / 2;
    CY = H / 2;
    state.auraMax = Math.hypot(W, H) * 0.55;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    const cssW = rect.width;
    const cssH = rect.height;
    state._cssW = cssW;
    state._cssH = cssH;
  }

  function showToast(msg, ms = 3200) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.getElementById("stage-wrap").appendChild(t);
    setTimeout(() => t.remove(), ms);
  }

  function setLevel(n) {
    state.level = n;
    levelTitleEl.textContent = LEVEL_TITLES[n] || "";
    listenEl.classList.toggle("hidden", n !== 1);
    mapPanel.classList.toggle("hidden", n < 4);
    canvas.classList.toggle("hidden", n === 1);
    if (n === 1) setupListen();
    if (n >= 2) {
      canvas.classList.remove("hidden");
      state.entities = [];
      state.spawnAcc = 0;
      state.goodSpawnAcc = 0;
      state.lastT = performance.now();
    }
    if (n === 2) {
      state.silence = 100;
      state.l2Timer = state.l2Duration;
      state.noiseMult = 1;
      state.l4AllGreenAnnounced = false;
      state.l4HintShown = false;
      showToast("飞机正在接近… 守护中央的寂静！", 4000);
      playPlaneSweep();
    }
    if (n === 3) {
      state.auraR = Math.min(W, H) * 0.08;
      state.silence = Math.max(state.silence, 70);
      scheduleNextLegislation();
    }
    if (n === 4) {
      renderMap();
    }
    if (n === 6) {
      state.entities = [];
      state.drawPath = [];
      state.finaleReady = false;
      showModalIntro6();
    }
    updateHud();
  }

  /* ——— Audio (simple Web Audio) ——— */
  function ensureAudio() {
    if (state.audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    state.audioCtx = new AC();
  }

  function resumeAudio() {
    ensureAudio();
    if (state.audioCtx && state.audioCtx.state === "suspended") state.audioCtx.resume();
  }

  function ambientLoop() {
    if (state.muted || !state.audioCtx || state.level !== 1) return;
    const ac = state.audioCtx;
    const t = ac.currentTime;
    const noise = ac.createBufferSource();
    const buf = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.08;
    noise.buffer = buf;
    const lp = ac.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 800;
    const g = ac.createGain();
    g.gain.value = 0.06;
    noise.connect(lp).connect(g).connect(ac.destination);
    noise.start(t);
    noise.stop(t + 2);
    if (state.level === 1 && !state.muted) setTimeout(ambientLoop, 1800);
  }

  function chirp() {
    if (state.muted || !state.audioCtx) return;
    const ac = state.audioCtx;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(1800 + Math.random() * 1200, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.08);
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.04, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.12);
    o.connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 0.15);
  }

  function playPlaneSweep() {
    if (state.muted || !state.audioCtx) return;
    const ac = state.audioCtx;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(120, ac.currentTime);
    o.frequency.linearRampToValueAtTime(220, ac.currentTime + 2.5);
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.12, ac.currentTime + 0.8);
    g.gain.linearRampToValueAtTime(0.02, ac.currentTime + 2.5);
    const f = ac.createBiquadFilter();
    f.type = "lowpass";
    f.frequency.value = 600;
    o.connect(f).connect(g).connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + 2.6);
  }

  setInterval(() => {
    if (state.level === 1 && !state.muted && state.audioCtx) chirp();
  }, 2200 + Math.random() * 1800);

  muteBtn.addEventListener("click", () => {
    state.muted = !state.muted;
    muteBtn.textContent = state.muted ? "音效：关" : "音效：开";
  });

  /* ——— Level 1 ——— */
  const SILENCE_TARGETS = 3;
  let listenTargets = [];

  function setupListen() {
    listenEl.innerHTML = "";
    state.l1Found = new Set();
    const w = listenEl.clientWidth;
    const h = listenEl.clientHeight;
    listenTargets = [];
    for (let i = 0; i < SILENCE_TARGETS + 1; i++) {
      const x = 0.15 * w + Math.random() * 0.7 * w;
      const y = 0.2 * h + Math.random() * 0.6 * h;
      listenTargets.push({ x, y, r: 36, id: i });
      const hint = document.createElement("div");
      hint.className = "hint-pulse";
      hint.style.left = x + "px";
      hint.style.top = y + "px";
      listenEl.appendChild(hint);
    }
  }

  function onListenTap(clientX, clientY) {
    const rect = listenEl.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    for (const t of listenTargets) {
      if (state.l1Found.has(t.id)) continue;
      if (Math.hypot(x - t.x, y - t.y) < t.r) {
        state.l1Found.add(t.id);
        showToast("这里有一平方英寸的寂静，它非常珍贵。");
        if (state.l1Found.size >= SILENCE_TARGETS) {
          setTimeout(() => setLevel(2), 1500);
        }
        break;
      }
    }
  }

  listenEl.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    onListenTap(e.clientX, e.clientY);
  });

  /* ——— Entities ——— */
  function spawnNoise() {
    const edge = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const sp = (0.35 + Math.random() * 0.25) * H * 0.012 * state.noiseMult;
    if (edge === 0) { x = Math.random() * W; y = -40; vx = (CX - x) * 0.002 * sp; vy = sp * 40; }
    else if (edge === 1) { x = W + 40; y = Math.random() * H; vx = -sp * 40; vy = (CY - y) * 0.002 * sp; }
    else if (edge === 2) { x = Math.random() * W; y = H + 40; vx = (CX - x) * 0.002 * sp; vy = -sp * 40; }
    else { x = -40; y = Math.random() * H; vx = sp * 40; vy = (CY - y) * 0.002 * sp; }
    const types = ["✈", "📱", "🏗", "🚁", "📢"];
    state.entities.push({
      kind: "bad",
      x, y, vx, vy,
      s: 28 * DPR,
      label: types[Math.floor(Math.random() * types.length)],
    });
  }

  function spawnGood() {
    const ang = Math.random() * Math.PI * 2;
    const dist = Math.max(W, H) * 0.55;
    const x = CX + Math.cos(ang) * dist;
    const y = CY + Math.sin(ang) * dist;
    const dx = CX - x, dy = CY - y;
    const len = Math.hypot(dx, dy) || 1;
    const sp = 0.22 * H * 0.01;
    state.entities.push({
      kind: "good",
      x, y,
      vx: (dx / len) * sp,
      vy: (dy / len) * sp,
      s: 26 * DPR,
      label: "🌿",
    });
  }

  function distToCenter(e) {
    return Math.hypot(e.x - CX, e.y - CY);
  }

  function inAura(e) {
    return distToCenter(e) < state.auraR;
  }

  function updateEntities(dt) {
    const hitR = 42 * DPR;
    for (let i = state.entities.length - 1; i >= 0; i--) {
      const e = state.entities[i];
      const aura = state.level >= 3 && inAura(e);
      let mul = 1;
      if (e.kind === "bad") {
        mul = aura ? 0.35 : 1;
        if (state.level === 4) mul *= 0.85;
      } else {
        mul = aura ? 1.45 : 1;
      }
      e.x += e.vx * mul * (dt / 16);
      e.y += e.vy * mul * (dt / 16);

      if (e.kind === "bad" && distToCenter(e) < hitR) {
        state.silence = Math.max(0, state.silence - 10);
        state.entities.splice(i, 1);
        continue;
      }
      if (e.x < -80 || e.x > W + 80 || e.y < -80 || e.y > H + 80) {
        state.entities.splice(i, 1);
      }
    }
  }

  function tryTapWorld(cssX, cssY) {
    const x = cssX * DPR;
    const y = cssY * DPR;
    for (let i = state.entities.length - 1; i >= 0; i--) {
      const e = state.entities[i];
      if (Math.abs(x - e.x) < e.s && Math.abs(y - e.y) < e.s) {
        if (e.kind === "good") {
          state.score += 1;
          state.silence = Math.min(100, state.silence + 4);
          if (state.level >= 3) {
            state.auraR = Math.min(state.auraMax, state.auraR + state._cssW * DPR * 0.028);
          }
          state.entities.splice(i, 1);
        } else {
          state.score += 1;
          state.entities.splice(i, 1);
        }
        updateHud();
        return true;
      }
    }
    return false;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if (state.level < 2) return;
    resumeAudio();
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (state.level === 6) {
      state.drawing = true;
      state.drawPath = [{ x, y }];
      return;
    }
    tryTapWorld(x, y);
  });

  canvas.addEventListener("pointermove", (e) => {
    if (state.level !== 6 || !state.drawing) return;
    const rect = canvas.getBoundingClientRect();
    state.drawPath.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
  });

  canvas.addEventListener("pointerup", endDraw);
  canvas.addEventListener("pointercancel", endDraw);

  function endDraw() {
    if (state.level !== 6 || !state.drawing) return;
    state.drawing = false;
    const p = state.drawPath;
    if (p.length < 8) return;
    const first = p[0], last = p[p.length - 1];
    const closeDist = Math.hypot(last.x - first.x, last.y - first.y);
    if (closeDist > state._cssW * 0.18) {
      showToast("请画一条闭合的线（终点靠近起点）");
      return;
    }
    const area = polygonAreaPx(p.map((q) => ({ x: q.x * DPR, y: q.y * DPR })));
    const km2 = Math.max(1, Math.round(area / (DPR * DPR) * 0.08));
    showNameModal(km2);
  }

  function polygonAreaPx(pts) {
    let a = 0;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
      a += pts[j].x * pts[i].y - pts[i].x * pts[j].y;
    }
    return Math.abs(a / 2);
  }

  /* ——— Legislation ——— */
  function scheduleNextLegislation() {
    state.nextLegislation = performance.now() + (14000 + Math.random() * 12000);
  }

  function showLegislationModal() {
    modalRoot.innerHTML = `
      <div class="modal">
        <div class="modal-card">
          <h3>立法阻挠</h3>
          <p>国会提议取消自然保护区的噪音限制！</p>
          <div class="modal-actions">
            <button type="button" class="btn" id="leg-a">花费 40 分游说议员（否决法案）</button>
            <button type="button" class="btn secondary" id="leg-b">拒绝花费（法案通过）</button>
          </div>
        </div>
      </div>`;
    document.getElementById("leg-a").onclick = () => {
      if (state.score >= 40) {
        state.score -= 40;
        state.legislationResisted += 1;
        modalRoot.innerHTML = "";
        showToast("法案被否决。");
        if (state.legislationResisted === 1) levelTitleEl.textContent = "关卡五 · 制度与寂静";
        updateHud();
      } else {
        showToast("分数不足，无法游说。");
      }
      scheduleNextLegislation();
    };
    document.getElementById("leg-b").onclick = () => {
      modalRoot.innerHTML = "";
      state.noiseMult *= 2;
      state.legisTimer = performance.now() + 15000;
      state.silence = Math.max(0, state.silence - 20);
      showToast("法案通过：15 秒内噪音加剧，寂静值 -20%");
      updateHud();
      scheduleNextLegislation();
    };
  }

  /* ——— Map ——— */
  function regionLevelClass(lv) {
    if (lv >= 2) return "green";
    if (lv >= 1) return "yellow";
    return "red";
  }

  function renderMap() {
    mapPanel.innerHTML = "<h3>寂静地图</h3>";
    REGIONS.forEach((r, idx) => {
      const lv = state.regions[idx];
      const row = document.createElement("div");
      row.className = "map-dot";
      row.innerHTML = `<span class="dot ${regionLevelClass(lv)}"></span><span>${r.name}</span>`;
      row.onclick = () => {
        if (lv >= 2) return;
        if (state.score < r.cost) {
          showToast("分数不足，继续收集自然之声");
          return;
        }
        state.score -= r.cost;
        state.regions[idx] = lv + 1;
        showToast(`${r.name} 寂静指数提升`);
        updateHud();
        renderMap();
        checkL4Complete();
      };
      mapPanel.appendChild(row);
    });
  }

  function checkL4Complete() {
    if (state.level !== 4) return;
    if (!state.regions.every((x) => x >= 2)) return;
    if (!state.l4AllGreenAnnounced) {
      state.l4AllGreenAnnounced = true;
      showToast("全球五地已恢复绿色寂静。");
    }
    if (canEnterFinale()) {
      setLevel(6);
    } else if (!state.l4HintShown) {
      state.l4HintShown = true;
      showToast("继续守护：寂静需≥80%，并至少两次游说成功。", 4200);
    }
  }

  function canEnterFinale() {
    return state.silence >= 80 && state.regions.every((x) => x >= 2) && state.legislationResisted >= 2;
  }

  /* ——— Loop ——— */
  function updateHud() {

    } else if (state.level === 4) {
      extraHud.textContent = "点击地图亮点消耗分数救援";

      extraHud.textContent = state.finaleReady ? "画闭合区域" : "阅读说明";
    } else extraHud.textContent = "";
  }

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一平方英寸的寂静 · 守护之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0e2a1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            padding: 12px;
        }

        .game-wrapper {
            background: #1e4a2e;
            border-radius: 36px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            margin: auto;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            background: #2c5e3a;
            cursor: crosshair;
            touch-action: none;
        }

        /* HUD 面板 */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px;
            gap: 16px;
            color: #f7f3df;
            text-shadow: 1px 1px 0 #1e3a2a;
            font-weight: bold;
        }

        .hud-item {
            background: #1e3a2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 模态弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .card {
            background: #fef7e0;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 1px solid #ddcca0;
        }

        .card h1 {
            font-size: 1.6rem;
            color: #2c5e2e;
            margin-bottom: 16px;
        }

        .rule-line {
            background: #ece4cc;
            border-radius: 28px;
            padding: 12px;
            margin: 12px 0;
            font-size: 0.8rem;
            text-align: left;
        }

        .rule-line p {
            margin: 6px 0;
        }

        .btn {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #2c5e2e;
            margin-top: 12px;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2c5e2e;
        }

        .toast {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a2a;
            color: #ffecb3;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 300;
            white-space: nowrap;
            animation: fadeUp 2s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        }

        /* 聆听模式的光圈动画 */
        .glow-ring {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(140, 220, 140, 0.8);
            background: radial-gradient(circle, rgba(100, 200, 100, 0.2), transparent);
            transform: translate(-50%, -50%);
            animation: pulse 2.2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="hud">
        <div class="hud-item">🎧 寂静值 <span id="silenceVal">100</span>%</div>
        <div class="hud-item">⏱️ 倒计时 <span id="timerVal">60</span>s</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<!-- 规则说明界面（初次显示） -->
<div id="rulesModal" class="modal">
    <div class="card">
        <h1>🌿 守护一平方英寸的寂静</h1>
        <div class="rule-line">
            <p>🟢 <strong>自然声</strong> 飞入中心 → <span style="color:green;">+10 寂静值</span></p>
            <p>🟢 误触自然声 → <span style="color:red;">-1 寂静值</span></p>
            <p>🔴 <strong>噪音</strong> 飞入中心 → <span style="color:red;">-10 寂静值</span></p>
            <p>🔴 点击噪音 → 成功拦截 (0损失)</p>
        </div>
        <p>当寂静值达到100%时，绿色光环出现，光环内噪音减速。<br>倒计时结束寂静值≥100%则胜利。</p>
        <button class="btn" id="startJourney">🌱 进入寂静之旅</button>
    </div>
</div>

<script>
    (function() {
        // ----- 画布元素 -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let canvasW, canvasH;
        let centerX, centerY, centerR = 35;  // 中心圆半径
        let itemSize = 44;                   // emoji 大小

        // ----- 游戏状态 -----
        let gamePhase = 'listen';      // 'listen', 'playing'
        let listenPoints = [];          // 存储 {x, y, id}
        let foundCount = 0;
        let NEED_LISTEN = 3;

        // 核心数值
        let silence = 100;              // 初始100%
        let timeLeft = 60;
        let timerInterval = null;
        let gameActive = false;          // 是否进行中（倒计时和生成）
        let animationId = null;

        // 实体列表
        let entities = [];
        let spawnCounter = 0;
        let SPAWN_DELAY = 28;            // 帧间隔，控制生成密度

        // 光环相关
        let auraRadius = 0;               // 0 = 未激活，>0 时显示光环
        let maxAura = 200;               // 光环最大半径（动态计算）
        let noiseSpeedFactor = 1;         // 光环内噪音速度乘数

        // 音频上下文
        let audioCtx = null;
        let ambientInterval = null;
        let planeSoundPlayed = false;

        // ----- 辅助函数 -----
        function resizeCanvas() {
            const container = canvas.parentElement;
            const w = container.clientWidth;
            let width = Math.min(w, 480);
            let height = width * 0.75;
            canvas.width = width;
            canvas.height = height;
            canvasW = width;
            canvasH = height;
            centerX = canvasW / 2;
            centerY = canvasH / 2;
            centerR = Math.min(40, canvasW * 0.09);
            itemSize = Math.min(48, canvasW * 0.1);
            maxAura = Math.min(canvasW, canvasH) * 0.55;
            if(silence >= 100) {
                auraRadius = maxAura * 0.5;   // 初始光环大小，随寂静值扩大?
                // 这里保持简单：寂静值>=100时显示固定大小光环
            }
        }

        function initAudio() {
            if(!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, dur, vol=0.2) {
            if(!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
                osc.start();
                osc.stop(now+dur);
            } catch(e) {}
        }

        function playPlaneSound() {
            if(!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(240, now+1.8);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.25, now+0.4);
                gain.gain.linearRampToValueAtTime(0.01, now+2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now+2);
            } catch(e) {}
        }

        function showToast(msg, duration=1800) {
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), duration);
        }

        // ----- 聆听模式（关卡1）-----
        function initListenMode() {
            // 移除之前的光圈
            const oldRings = document.querySelectorAll('.glow-ring');
            oldRings.forEach(r => r.remove());
            listenPoints = [];
            const rect = canvas.getBoundingClientRect();
            const w = rect.width, h = rect.height;
            for(let i=0; i<NEED_LISTEN+1; i++) {
                const x = 40 + Math.random() * (w - 80);
                const y = 50 + Math.random() * (h - 100);
                listenPoints.push({ x, y, id: i });
                const ring = document.createElement('div');
                ring.className = 'glow-ring';
                ring.style.left = x + 'px';
                ring.style.top = y + 'px';
                canvas.parentElement.style.position = 'relative';
                canvas.parentElement.appendChild(ring);
                ring.setAttribute('data-id', i);
            }
            foundCount = 0;
            gamePhase = 'listen';
            gameActive = false;   // 未开始主要游戏
            // 背景自然声（循环）
            if(ambientInterval) clearInterval(ambientInterval);
            ambientInterval = setInterval(() => {
                if(gamePhase === 'listen' && audioCtx && !planeSoundPlayed) {
                    // 随机鸟鸣
                    playSound(500 + Math.random()*400, 0.2, 0.05);
                }
            }, 2500);
        }

        // 监听点击 canvas 区域（用于聆听模式）
        function handleListenTap(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            for(let i=0; i<listenPoints.length; i++) {
                const p = listenPoints[i];
                const dist = Math.hypot(x - p.x, y - p.y);
                if(dist < 35) {
                    // 找到寂静点
                    listenPoints.splice(i,1);
                    // 移除对应的光圈元素
                    const rings = document.querySelectorAll('.glow-ring');
                    for(let r of rings) {
                        if(Math.abs(parseFloat(r.style.left) - p.x) < 5 && Math.abs(parseFloat(r.style.top) - p.y) < 5) {
                            r.remove();
                            break;
                        }
                    }
                    foundCount++;
                    showToast(`✨ 这里有一平方英寸的寂静，它非常珍贵。 (${foundCount}/${NEED_LISTEN})`, 1800);
                    if(foundCount >= NEED_LISTEN) {
                        // 过渡到关卡2
                        gamePhase = 'transition';
                        if(ambientInterval) clearInterval(ambientInterval);
                        showToast("✈️ 远处传来飞机的轰鸣...", 2000);
                        playPlaneSound();
                        setTimeout(() => {
                            // 清除所有聆听残留光环
                            document.querySelectorAll('.glow-ring').forEach(r => r.remove());
                            startGameCore();
                        }, 2000);
                    }
                    break;
                }
            }
        }

        // ----- 核心游戏（关卡2）-----
        function startGameCore() {
            resizeCanvas();
            silence = 100;
            timeLeft = 60;
            entities = [];
            spawnCounter = 0;
            gameActive = true;
            gamePhase = 'playing';
            updateUI();
            // 开始倒计时
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!gameActive) return;
                if(timeLeft <= 1) {
                    timeLeft = 0;
                    updateUI();
                    endGame();
                } else {
                    timeLeft--;
                    updateUI();
                }
            }, 1000);
            // 启动动画循环
            if(animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(drawLoop);
        }

        // 生成实体（噪音或自然声）
        function spawnEntity() {
            if(!gameActive) return;
            const isNatural = Math.random() < 0.55;  // 自然声略多，但噪音更有威胁
            const emoji = isNatural ? 
                ['🐦','🦋','🌿','💧','🍃'][Math.floor(Math.random()*5)] :
                ['✈️','📱','🚗','🔊','🏗️'][Math.floor(Math.random()*5)];
            const size = itemSize;
            const edge = Math.floor(Math.random()*4);
            let x, y, vx, vy;
            const speedBase = 2.2 * (canvasW / 400);
            if(edge === 0) { x = -size; y = Math.random() * canvasH; vx = speedBase * 1.2; vy = (centerY - y) * 0.015; }
            else if(edge === 1) { x = canvasW + size; y = Math.random() * canvasH; vx = -speedBase * 1.2; vy = (centerY - y) * 0.015; }
            else if(edge === 2) { x = Math.random() * canvasW; y = -size; vx = (centerX - x) * 0.015; vy = speedBase * 1.2; }
            else { x = Math.random() * canvasW; y = canvasH + size; vx = (centerX - x) * 0.015; vy = -speedBase * 1.2; }
            entities.push({
                x, y, vx, vy, size,
                emoji: emoji,
                type: isNatural ? 'natural' : 'noise'
            });
        }

        function updateEntities(deltaTime = 1) {
            const hitDist = centerR + 12;
            for(let i=0; i<entities.length; i++) {
                const e = entities[i];
                let speedMul = 1;
                // 光环内减速效果（仅噪音，光环只在寂静值>=100时出现）
                if(silence >= 100 && auraRadius > 0) {
                    const distToCenter = Math.hypot(e.x + e.size/2 - centerX, e.y + e.size/2 - centerY);
                    if(distToCenter < auraRadius && e.type === 'noise') {
                        speedMul = 0.55;
                    }
                }
                e.x += e.vx * speedMul;
                e.y += e.vy * speedMul;
                // 触碰中心判定
                const dist = Math.hypot(e.x + e.size/2 - centerX, e.y + e.size/2 - centerY);
                if(dist < hitDist) {
                    if(e.type === 'natural') {
                        silence = Math.min(100, silence + 10);
                        playSound(880, 0.2, 0.2);
                        showToast('🌿 自然之声融入寂静 +10', 600);
                    } else {
                        silence = Math.max(0, silence - 10);
                        playSound(140, 0.25, 0.3);
                        showToast('💥 噪音污染 -10', 600);
                        if(silence <= 0) endGame(false);
                    }
                    updateUI();
                    entities.splice(i,1);
                    i--;
                    continue;
                }
                // 超出边界移除
                if(e.x + e.size < -200 || e.x > canvasW+200 || e.y + e.size < -200 || e.y > canvasH+200) {
                    entities.splice(i,1);
                    i--;
                }
            }
            // 更新光环：寂静值>=100时激活
            if(silence >= 100) {
                auraRadius = maxAura * 0.85;
            } else {
                auraRadius = 0;
            }
        }

        function handleTap(clientX, clientY) {
            if(gamePhase !== 'playing' || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasW / rect.width;
            const scaleY = canvasH / rect.height;
            const tapX = (clientX - rect.left) * scaleX;
            const tapY = (clientY - rect.top) * scaleY;
            for(let i=0; i<entities.length; i++) {
                const e = entities[i];
                const left = e.x, right = e.x + e.size;
                const top = e.y, bottom = e.y + e.size;
                if(tapX >= left && tapX <= right && tapY >= top && tapY <= bottom) {
                    if(e.type === 'natural') {
                        silence = Math.max(0, silence - 1);
                        playSound(330, 0.2, 0.15);
                        showToast('🙊 不要打扰自然 -1', 600);
                    } else {
                        // 成功拦截噪音
                        playSound(200, 0.1, 0.1);
                        showToast('🛡️ 拦截噪音', 400);
                    }
                    entities.splice(i,1);
                    updateUI();
                    break;
                }
            }
        }

        function updateUI() {
            document.getElementById('silenceVal').innerText = Math.floor(silence);
            document.getElementById('timerVal').innerText = Math.floor(timeLeft);
        }

        function endGame(isSuccess = null) {
            if(!gameActive) return;
            gameActive = false;
            if(timerInterval) clearInterval(timerInterval);
            const success = (timeLeft <= 0 && silence >= 100);
            const msg = success ? "🎉 成功守护寂静！" : "💔 寂静被噪音吞没...";
            showToast(msg, 2500);
            // 弹出重玩弹窗
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="card">
                    <h2>${success ? "✨ 胜利 ✨" : "❌ 失败"}</h2>
                    <p>${success ? "你让寂静之环绽放，保护区初具雏形。" : "噪音侵蚀了最后一片寂静。"}</p>
                    <button class="btn" id="replayGame">🔄 再次守护</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('replayGame').onclick = () => {
                modal.remove();
                resetFullGame();
            };
            if(animationId) cancelAnimationFrame(animationId);
        }

        function resetFullGame() {
            // 重置所有状态，回到聆听模式
            if(timerInterval) clearInterval(timerInterval);
            if(ambientInterval) clearInterval(ambientInterval);
            if(animationId) cancelAnimationFrame(animationId);
            gameActive = false;
            gamePhase = 'listen';
            entities = [];
            silence = 100;
            timeLeft = 60;
            updateUI();
            // 重新初始化聆听模式
            initListenMode();
            // 重新绑定画布事件（避免重复）
            drawIdle();
        }

        function drawIdle() {
            if(!canvas) return;
            ctx.clearRect(0, 0, canvasW, canvasH);
            // 简单森林背景
            ctx.fillStyle = '#2c5e3a';
            ctx.fillRect(0, 0, canvasW, canvasH);
            ctx.fillStyle = '#e0e8c0';
            ctx.font = "18px system-ui";
            ctx.fillText("🌲 聆听森林的寂静 🌲", centerX-120, centerY-40);
        }

        // 绘制主游戏
        function drawGame() {
            ctx.clearRect(0,0,canvasW,canvasH);
            // 背景
            const grad = ctx.createLinearGradient(0,0,0,canvasH);
            grad.addColorStop(0,"#1e4a2e");
            grad.addColorStop(1,"#0e2a1f");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvasW,canvasH);
            // 绘制实体 (emoji)
            for(const e of entities) {
                ctx.font = `${e.size}px "Segoe UI Emoji"`;
                ctx.fillStyle = e.type === 'natural' ? '#b8e4b0' : '#f0b0a0';
                ctx.fillText(e.emoji, e.x, e.y + e.size/1.5);
            }
            // 中心圆
            ctx.beginPath();
            ctx.arc(centerX, centerY, centerR, 0, Math.PI*2);
            ctx.fillStyle = "#f9efc0";
            ctx.fill();
            ctx.strokeStyle = "#8cb87a";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.fillStyle = "#1e3a2a";
            ctx.font = "bold 18px system-ui";
            ctx.fillText("🌿", centerX-10, centerY+6);
            // 光环（寂静值≥100 且 auraRadius > 0）
            if(silence >= 100 && auraRadius > 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, auraRadius, 0, Math.PI*2);
                ctx.fillStyle = "rgba(100, 200, 100, 0.12)";
                ctx.fill();
                ctx.strokeStyle = "#80c080";
                ctx.setLineDash([6, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = "#e0ffc0";
                ctx.font = "12px monospace";
                ctx.fillText("寂静辐射区", centerX+auraRadius-40, centerY-12);
            }
        }

        function drawLoop() {
            if(!gameActive) {
                // 如果不在playing，可能还在listen模式，需绘制聆听层
                if(gamePhase === 'listen') {
                    drawIdle();
                }
                requestAnimationFrame(drawLoop);
                return;
            }
            // 游戏进行中
            spawnCounter++;
            if(spawnCounter >= SPAWN_DELAY) {
                spawnCounter = 0;
                spawnEntity();
                if(entities.length > 35) entities.splice(0,8);
            }
            updateEntities(1);
            drawGame();
            requestAnimationFrame(drawLoop);
        }

        // ----- 事件绑定 -----
        function bindEvents() {
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                if(gamePhase === 'listen') {
                    handleListenTap(e.clientX, e.clientY);
                } else if(gamePhase === 'playing') {
                    handleTap(e.clientX, e.clientY);
                }
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                if(gamePhase === 'listen') {
                    handleListenTap(touch.clientX, touch.clientY);
                } else if(gamePhase === 'playing') {
                    handleTap(touch.clientX, touch.clientY);
                }
            }, { passive: false });
        }

        // 启动游戏（从规则界面开始）
        function startGame() {
            resizeCanvas();
            initAudio();
            bindEvents();
            // 开始聆听模式
            initListenMode();
            // 启动绘制循环（一直运行）
            drawLoop();
            // 播放背景自然声（已在 initListenMode 中）
        }

        // 规则界面的“开始旅程”
        document.getElementById('startJourney').onclick = () => {
            document.getElementById('rulesModal').style.display = 'none';
            startGame();
            // 确保音频上下文在用户手势后启动
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        };

        // 初始调整尺寸
        window.addEventListener('resize', () => {
            resizeCanvas();
            if(gamePhase === 'listen') drawIdle();
        });
        resizeCanvas();
    })();
</script>
</body>
</html>

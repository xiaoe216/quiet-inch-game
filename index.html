<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>守护一平方英寸 · 寂静之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a3f2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }
        .game-container {
            background: #2c5e3a;
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 100%;
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: #2d4a3b;
            touch-action: manipulation;
            width: 100%;
            height: auto;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 12px 12px;
            color: #f9f1cf;
            font-weight: bold;
            text-shadow: 1px 1px 0 #1e3a2a;
            flex-wrap: wrap;
            gap: 8px;
        }
        .score-box, .timer-box, .silence-box {
            background: #1e3a2a;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .silence-box {
            background: #2d6a4f;
        }
        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-card {
            background: #fff9ef;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        .modal-card h2 {
            color: #2c5e2e;
            margin-bottom: 16px;
        }
        .modal-card button {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 60px;
            margin: 8px;
            cursor: pointer;
        }
        .world-map {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(30,30,20,0.8);
            border-radius: 16px;
            padding: 8px;
            backdrop-filter: blur(4px);
            display: flex;
            gap: 8px;
            z-index: 10;
            pointer-events: auto;
        }
        .map-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #c0392b;
            text-align: center;
            line-height: 36px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 0 1px gold;
        }
        .map-dot.green { background: #2e7d32; }
        .map-dot.yellow { background: #f39c12; }
        .map-dot.red { background: #c0392b; }
        .event-toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c1c;
            color: #ffecb3;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 15;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            pointer-events: none;
        }
        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }
        .card {
            background: #fff9ef;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
        }
        .card h1 { color: #2c5e2e; margin-bottom: 12px; }
        .rule-list { text-align: left; margin: 16px 0; background: #f4efdf; border-radius: 28px; padding: 12px; }
        .rule-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .rule-icon { font-size: 28px; width: 40px; text-align: center; }
        .rule-text { flex: 1; font-size: 0.8rem; }
        .btn {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 8px;
        }
        @media (max-width: 600px) {
            .map-dot { width: 28px; height: 28px; line-height: 28px; font-size: 14px; }
            .info-panel > div { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="score-box">🍃 积分: <span id="scoreVal">0</span></div>
        <div class="silence-box">🌿 寂静值: <span id="silenceVal">100</span>%</div>
        <div class="timer-box">⏱️ <span id="timerVal">60</span>s</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<div id="worldMapPanel" class="world-map" style="display: none;"></div>

<!-- 开始界面 -->
<div id="startScreen" class="start-screen">
    <div class="card">
        <h1>🌿 守护一平方英寸</h1>
        <div class="rule-list">
            <div class="rule-item"><div class="rule-icon">🟢</div><div class="rule-text">自然声 → 让它飞入中心 <span style="color:green;">+积分/+寂静</span><br>点击它会扣分</div></div>
            <div class="rule-item"><div class="rule-icon">🔴</div><div class="rule-text">噪音 → 点击它拦截 (0分)<br>漏掉触碰中心会降低寂静值</div></div>
            <div class="rule-item"><div class="rule-icon">✨</div><div class="rule-text">光环: 点击自然声扩大光环，光环内噪音减速、自然声加速</div></div>
        </div>
        <button class="btn" id="startBtn">🎧 开始旅程</button>
        <p style="font-size:10px; margin-top:16px;">戈登·汉普顿《一平方英寸的寂静》</p>
    </div>
</div>

<script>
(function(){
    // ---------- 画布元素 ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let canvasWidth, canvasHeight;
    function resizeCanvas() {
        let width = window.innerWidth - 24;
        if(width > 500) width = 500;
        let height = width * 1.2;
        if(height > window.innerHeight - 100) {
            height = window.innerHeight - 100;
            width = height / 1.2;
        }
        canvas.width = width;
        canvas.height = height;
        canvasWidth = width;
        canvasHeight = height;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { if(!gameActive) resizeCanvas(); });
    
    // 游戏状态
    let gameActive = false;
    let stage = 1;          // 1:聆听模式, 2:入侵, 3:光环, 4:地图, 5:立法, 6:终局
    let score = 0;
    let silence = 100;
    let timeLeft = 60;
    let timerInterval = null;
    let items = [];
    let spawnCounter = 0;
    let baseSpawnDelay = 22;
    let currentSpawnDelay = baseSpawnDelay;
    
    // 光环相关
    let auraRadius = 60;          // 初始半径
    let maxAura = Math.min(canvasWidth, canvasHeight) * 0.45;
    let centerX = canvasWidth/2, centerY = canvasHeight/2;
    let centerRadius = 60;
    
    // 世界地图
    let mapPoints = [
        { name:"亚马逊", status:"red", value:0, max:100 },
        { name:"阿尔卑斯", status:"red", value:0, max:100 },
        { name:"屋久岛", status:"red", value:0, max:100 },
        { name:"落基山", status:"red", value:0, max:100 },
        { name:"台湾山林", status:"red", value:0, max:100 }
    ];
    let mapUnlocked = false;
    
    // 立法事件
    let lawResistCount = 0;
    let lawEventActive = false;
    let lawInterval = null;
    
    // 聆听模式寂静点
    let listeningPoints = [];
    let foundPoints = 0;
    const NEED_POINTS = 3;
    
    // 音频
    let audioCtx = null;
    let ambientInterval = null;
    function initAudio() {
        if(!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    function playSound(freq, dur, vol=0.2) {
        if(!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
            osc.stop(now+dur);
        } catch(e) {}
    }
    function playPlaneSound() {
        if(!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 180;
            gain.gain.value = 0.3;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, now+2);
            osc.stop(now+2);
        } catch(e) {}
    }
    function startAmbient() {
        if(ambientInterval) clearInterval(ambientInterval);
        ambientInterval = setInterval(() => {
            if(gameActive && Math.random()<0.2) playSound(600+Math.random()*300, 0.2, 0.05);
        }, 4000);
    }
    function stopAmbient() {
        if(ambientInterval) clearInterval(ambientInterval);
    }
    
    // 图标生成 (简单彩色圆+emoji)
    let naturalImg, noiseImg;
    function createIcon(color, emoji) {
        const off = document.createElement('canvas');
        off.width = 64; off.height = 64;
        const octx = off.getContext('2d');
        octx.fillStyle = color;
        octx.beginPath();
        octx.arc(32,32,28,0,Math.PI*2);
        octx.fill();
        octx.fillStyle = 'white';
        octx.font = '32px sans-serif';
        octx.fillText(emoji, 18, 46);
        const img = new Image();
        img.src = off.toDataURL();
        return img;
    }
    naturalImg = createIcon('#2e7d32', '🦋');
    noiseImg = createIcon('#b71c1c', '📱');
    
    function spawnItem() {
        if(stage < 2) return;
        let isNatural = Math.random() < 0.55;
        let img = isNatural ? naturalImg : noiseImg;
        let size = 48;
        let edge = Math.floor(Math.random()*4);
        let x,y;
        if(edge===0){ x = -size; y = Math.random()*canvasHeight; }
        else if(edge===1){ x = canvasWidth+size; y = Math.random()*canvasHeight; }
        else if(edge===2){ x = Math.random()*canvasWidth; y = -size; }
        else { x = Math.random()*canvasWidth; y = canvasHeight+size; }
        let dx = centerX - x, dy = centerY - y;
        let len = Math.hypot(dx,dy);
        let vx = dx/len * 2.6;
        let vy = dy/len * 2.6;
        items.push({ x,y,vx,vy,img,size, type: isNatural ? 'natural' : 'noise' });
    }
    
    function updateItems() {
        for(let i=0; i<items.length; i++) {
            let it = items[i];
            // 光环影响速度
            let distToCenter = Math.hypot(it.x+it.size/2 - centerX, it.y+it.size/2 - centerY);
            let speedFactor = 1;
            if(stage >= 3 && distToCenter < auraRadius) {
                speedFactor = (it.type === 'noise') ? 0.6 : 1.3;
            }
            it.x += it.vx * speedFactor;
            it.y += it.vy * speedFactor;
            // 触碰中心检测
            let centerDist = Math.hypot(it.x+it.size/2 - centerX, it.y+it.size/2 - centerY);
            if(centerDist < centerRadius + it.size/2) {
                if(it.type === 'natural') {
                    score += 1;
                    silence = Math.min(100, silence + 2);
                    // 光环扩张
                    if(stage >= 3) {
                        auraRadius = Math.min(maxAura, auraRadius + 2);
                    }
                    playSound(880, 0.2, 0.2);
                } else { // noise 入侵扣寂静
                    silence = Math.max(0, silence - 8);
                    playSound(140, 0.2, 0.25);
                    if(silence <= 0) gameLose("寂静值归零，噪音彻底入侵");
                }
                items.splice(i,1);
                i--;
                continue;
            }
            // 超出边界移除
            if(it.x+it.size < -200 || it.x > canvasWidth+200 || it.y+it.size < -200 || it.y > canvasHeight+200) {
                items.splice(i,1);
                i--;
            }
        }
    }
    
    // 绘制
    function drawBackground() {
        const grad = ctx.createLinearGradient(0,0,0,canvasHeight);
        grad.addColorStop(0,"#2d5a3b");
        grad.addColorStop(1,"#1d3e2a");
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvasWidth,canvasHeight);
        ctx.fillStyle = "#1e3a1e";
        for(let i=0;i<10;i++) ctx.fillRect(40+i*70, canvasHeight-80, 15, 70);
    }
    function drawCenter() {
        ctx.beginPath();
        ctx.arc(centerX, centerY, centerRadius, 0, Math.PI*2);
        ctx.fillStyle = "#f4e3b1";
        ctx.fill();
        ctx.strokeStyle = "#c9a87b";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#5d3a1a";
        ctx.font = `bold ${Math.max(14, centerRadius*0.28)}px system-ui`;
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("🌿 寂静地", centerX, centerY);
        if(stage >= 3) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, auraRadius, 0, Math.PI*2);
            ctx.fillStyle = "rgba(180,220,120,0.2)";
            ctx.fill();
            ctx.strokeStyle = "#7cb518";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = "#ffecb3";
            ctx.font = "10px monospace";
            ctx.fillText("守护光环", centerX+auraRadius-20, centerY-5);
        }
    }
    function drawItems() { for(let it of items) ctx.drawImage(it.img, it.x, it.y, it.size, it.size); }
    function drawListeningPoints() {
        for(let p of listeningPoints) {
            if(!p.found) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 16, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,200,0.7)";
                ctx.fill();
                ctx.fillStyle = "#2c5e2e";
                ctx.font = "bold 24px sans-serif";
                ctx.fillText("🔊", p.x-12, p.y+10);
            }
        }
    }
    function updateUI() {
        document.getElementById('scoreVal').innerText = Math.floor(score);
        document.getElementById('silenceVal').innerText = Math.floor(silence);
        document.getElementById('timerVal').innerText = timeLeft;
    }
    
    // 阶段过渡
    function advanceStage() {
        if(stage == 1 && foundPoints >= NEED_POINTS) {
            stage = 2;
            stopAmbient();
            playPlaneSound();
            showToast("✈️ 噪音入侵！快拦截红色噪音，保护寂静值", 2500);
            startTimer();
            // 初始生成几个噪音
            for(let i=0;i<3;i++) spawnItem();
        }
        if(stage == 2 && score >= 30 && silence > 60) {
            stage = 3;
            showToast("✨ 你领悟了以点带面的力量！光环开始扩张", 2000);
        }
        if(stage == 3 && auraRadius >= maxAura * 0.8 && score >= 70) {
            stage = 4;
            mapUnlocked = true;
            showToast("🌍 全球寂静地图解锁！消耗积分修复其他地区的寂静", 2500);
            renderMapDots();
        }
        if(stage == 4 && mapPoints.every(p => p.status === 'green')) {
            stage = 5;
            showToast("🏛️ 立法危机出现！制度保护寂静需要你的努力", 2000);
            startLawEvents();
        }
        if(stage == 5 && lawResistCount >= 2 && silence >= 70 && score >= 100) {
            stage = 6;
            gameWinFinal();
        }
    }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            if(timeLeft <= 1) {
                timeLeft = 0;
                updateUI();
                if(stage < 6) gameLose("时间耗尽，寂静未能完全守护");
            } else {
                timeLeft--;
                updateUI();
            }
        }, 1000);
    }
    
    function showToast(msg, duration) {
        let div = document.createElement('div');
        div.className = 'event-toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), duration);
    }
    
    function gameLose(msg) {
        if(!gameActive) return;
        gameActive = false;
        if(timerInterval) clearInterval(timerInterval);
        stopAmbient();
        alert(msg + "\n点击确定重新开始");
        location.reload();
    }
    
    function gameWinFinal() {
        gameActive = false;
        if(timerInterval) clearInterval(timerInterval);
        stopAmbient();
        // 划定保护区界面
        let div = document.createElement('div');
        div.className = 'modal';
        div.innerHTML = `
            <div class="modal-card">
                <h2>🏞️ 建立永久寂静保护区</h2>
                <p>你已经证明了寂静的价值，现在请为这片土地划定边界并命名。</p>
                <canvas id="drawCanvas" width="400" height="250" style="background:#ddd; border-radius:16px; margin:16px 0;"></canvas>
                <input id="reserveName" placeholder="保护区名称" style="padding:8px; border-radius:40px; margin-bottom:12px; width:80%;">
                <button id="confirmReserve">🌿 确立保护区</button>
            </div>
        `;
        document.body.appendChild(div);
        let drawCanvas = document.getElementById('drawCanvas');
        let dctx = drawCanvas.getContext('2d');
        dctx.fillStyle = "#aad4aa";
        dctx.fillRect(0,0,drawCanvas.width,drawCanvas.height);
        let drawing = false, points = [];
        function drawPoint(x,y) {
            dctx.beginPath();
            dctx.arc(x,y,3,0,Math.PI*2);
            dctx.fillStyle = 'blue';
            dctx.fill();
        }
        drawCanvas.onmousedown = (e) => { drawing=true; points=[]; };
        drawCanvas.onmousemove = (e) => {
            if(!drawing) return;
            let rect = drawCanvas.getBoundingClientRect();
            let x = (e.clientX - rect.left) * drawCanvas.width / rect.width;
            let y = (e.clientY - rect.top) * drawCanvas.height / rect.height;
            points.push({x,y});
            drawPoint(x,y);
        };
        drawCanvas.onmouseup = () => {
            drawing=false;
            if(points.length>3) {
                dctx.beginPath();
                dctx.moveTo(points[0].x, points[0].y);
                for(let p of points) dctx.lineTo(p.x,p.y);
                dctx.closePath();
                dctx.fillStyle = 'rgba(100,200,100,0.3)';
                dctx.fill();
                dctx.strokeStyle = 'green';
                dctx.lineWidth=2;
                dctx.stroke();
            }
        };
        drawCanvas.ontouchstart = (e) => { e.preventDefault(); drawing=true; points=[]; };
        drawCanvas.ontouchmove = (e) => {
            e.preventDefault();
            let rect = drawCanvas.getBoundingClientRect();
            let touch = e.touches[0];
            let x = (touch.clientX - rect.left) * drawCanvas.width / rect.width;
            let y = (touch.clientY - rect.top) * drawCanvas.height / rect.height;
            points.push({x,y});
            drawPoint(x,y);
        };
        drawCanvas.ontouchend = (e) => drawCanvas.onmouseup();
        document.getElementById('confirmReserve').onclick = () => {
            let name = document.getElementById('reserveName').value.trim();
            if(!name) name = "寂静之域";
            alert(`🎉 恭喜！你建立了永久寂静保护区「${name}」\n感谢你的守护！`);
            location.reload();
        };
    }
    
    // 世界地图UI
    function renderMapDots() {
        let panel = document.getElementById('worldMapPanel');
        panel.style.display = 'flex';
        panel.innerHTML = '';
        mapPoints.forEach((pt, idx) => {
            let dot = document.createElement('div');
            dot.className = `map-dot ${pt.status}`;
            dot.innerText = pt.status==='green'?'✓':(pt.status==='yellow'?'🟡':'🔴');
            dot.onclick = () => {
                if(stage>=4 && pt.status !== 'green' && gameActive) {
                    let cost = 25;
                    if(score >= cost) {
                        score -= cost;
                        pt.value = Math.min(pt.max, pt.value + 20);
                        if(pt.value >= pt.max) {
                            pt.status = 'green';
                            dot.className='map-dot green';
                            dot.innerText='✓';
                            showToast(`${pt.name} 寂静恢复！`, 1000);
                            if(mapPoints.every(p=>p.status==='green')) showToast("所有寂静点已点亮！进入下一阶段", 1500);
                        } else {
                            if(pt.value > 50) pt.status = 'yellow';
                            dot.className = `map-dot ${pt.status}`;
                            dot.innerText = pt.status==='yellow'?'🟡':'🔴';
                        }
                        updateUI();
                    } else {
                        showToast("积分不足", 800);
                    }
                }
            };
            panel.appendChild(dot);
        });
    }
    
    function startLawEvents() {
        if(lawInterval) clearInterval(lawInterval);
        lawInterval = setInterval(() => {
            if(!gameActive || stage!=5 || lawEventActive) return;
            if(Math.random() < 0.025) {
                lawEventActive = true;
                let modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-card">
                        <h2>🏛️ 立法危机</h2>
                        <p>「国会提议取消自然保护区的噪音限制！」</p>
                        <button id="resistBtn">🌿 游说议员 (花费35积分)</button>
                        <button id="ignoreBtn">⚠️ 放任不管</button>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('resistBtn').onclick = () => {
                    if(score >= 35) {
                        score -= 35;
                        lawResistCount++;
                        showToast("法案被否决！制度保护了寂静", 1500);
                        playSound(800,0.2);
                    } else {
                        showToast("积分不足，无法游说",1000);
                        silence = Math.max(0, silence-15);
                        currentSpawnDelay = Math.max(8, currentSpawnDelay-4);
                        setTimeout(() => { currentSpawnDelay = baseSpawnDelay; }, 12000);
                    }
                    modal.remove();
                    lawEventActive = false;
                };
                document.getElementById('ignoreBtn').onclick = () => {
                    silence = Math.max(0, silence-15);
                    currentSpawnDelay = Math.max(8, currentSpawnDelay-4);
                    setTimeout(() => { currentSpawnDelay = baseSpawnDelay; }, 12000);
                    showToast("法案通过！噪音加剧",1500);
                    modal.remove();
                    lawEventActive = false;
                };
            }
        }, 18000);
    }
    
    // 交互点击
    function handleHit(clientX, clientY) {
        if(!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const sx = canvasWidth/rect.width, sy = canvasHeight/rect.height;
        const mx = (clientX - rect.left) * sx;
        const my = (clientY - rect.top) * sy;
        if(stage === 1) {
            for(let p of listeningPoints) {
                if(!p.found && Math.hypot(mx-p.x, my-p.y) < 25) {
                    p.found = true;
                    foundPoints++;
                    playSound(660,0.3,0.2);
                    showToast(`✨ 发现寂静点 (${foundPoints}/${NEED_POINTS})`, 1000);
                    if(foundPoints >= NEED_POINTS) advanceStage();
                    break;
                }
            }
            return;
        }
        // 阶段2+ 点击图标
        for(let i=items.length-1; i>=0; i--) {
            let it = items[i];
            if(mx >= it.x && mx <= it.x+it.size && my >= it.y && my <= it.y+it.size) {
                if(it.type === 'natural') {
                    // 错误点击自然声 -> 扣分
                    score = Math.max(0, score-2);
                    silence = Math.max(0, silence-3);
                    playSound(400,0.2,0.15);
                    showToast("不要打扰自然声！", 600);
                } else {
                    // 正确拦截噪音 -> 不加分，但保护寂静
                    playSound(200,0.1,0.1);
                }
                items.splice(i,1);
                break;
            }
        }
    }
    
    canvas.addEventListener('click', (e) => handleHit(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.touches[0];
        handleHit(t.clientX, t.clientY);
    }, {passive: false});
    
    // 初始化游戏
    function initGame() {
        resizeCanvas();
        centerX = canvasWidth/2; centerY = canvasHeight/2;
        centerRadius = Math.min(60, canvasWidth*0.12);
        auraRadius = centerRadius;
        maxAura = Math.min(canvasWidth, canvasHeight) * 0.45;
        initAudio();
        // 生成聆听点
        listeningPoints = [];
        for(let i=0;i<5;i++) {
            listeningPoints.push({
                x: 80 + Math.random()*(canvasWidth-160),
                y: 80 + Math.random()*(canvasHeight-160),
                found: false
            });
        }
        foundPoints = 0;
        stage = 1;
        gameActive = true;
        score = 0;
        silence = 100;
        timeLeft = 60;
        items = [];
        spawnCounter = 0;
        currentSpawnDelay = baseSpawnDelay;
        mapUnlocked = false;
        lawResistCount = 0;
        lawEventActive = false;
        document.getElementById('worldMapPanel').style.display = 'none';
        startAmbient();
        updateUI();
        // 每隔500ms检查阶段
        let stageInterval = setInterval(() => {
            if(!gameActive) { clearInterval(stageInterval); return; }
            advanceStage();
            if(stage >= 4 && mapUnlocked) renderMapDots();
            if(stage >= 5 && !lawInterval) startLawEvents();
        }, 800);
        // 游戏主循环
        function gameLoop() {
            if(!gameActive) return;
            if(stage >= 2) {
                spawnCounter++;
                if(spawnCounter >= currentSpawnDelay) {
                    spawnCounter = 0;
                    spawnItem();
                    if(items.length > 45) items.splice(0,10);
                }
                updateItems();
            }
            drawBackground();
            if(stage === 1) drawListeningPoints();
            drawItems();
            drawCenter();
            updateUI();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    }
    
    // 开始按钮
    document.getElementById('startBtn').onclick = () => {
        document.getElementById('startScreen').style.display = 'none';
        initGame();
    };
})();
</script>

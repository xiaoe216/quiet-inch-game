<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>守护一平方英寸 · 寂静之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a3f2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }
        .game-container {
            background: #2c5e3a;
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 100%;
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: #2d4a3b;
            touch-action: manipulation;
            width: 100%;
            height: auto;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 12px 12px;
            color: #f9f1cf;
            font-weight: bold;
            text-shadow: 1px 1px 0 #1e3a2a;
        }
        .score-box, .timer-box, .silence-box {
            background: #1e3a2a;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 1rem;
        }
        .silence-box {
            background: #2d6a4f;
        }
        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .modal-card {
            background: #fff9ef;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        .modal-card h2 {
            color: #2c5e2e;
            margin-bottom: 16px;
        }
        .modal-card button {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 10px 20px;
            border-radius: 60px;
            margin: 8px;
            cursor: pointer;
        }
        .world-map {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(30,30,20,0.8);
            border-radius: 16px;
            padding: 8px;
            backdrop-filter: blur(4px);
            display: flex;
            gap: 8px;
            z-index: 10;
            pointer-events: auto;
        }
        .map-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #c0392b;
            text-align: center;
            line-height: 32px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 0 1px gold;
        }
        .map-dot.green { background: #2e7d32; }
        .map-dot.yellow { background: #f39c12; }
        .map-dot.red { background: #c0392b; }
        .event-toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c1c;
            color: #ffecb3;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 15;
            white-space: nowrap;
        }
        .draw-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .draw-canvas {
            background: #ddd;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        @media (max-width: 600px) {
            .map-dot { width: 28px; height: 28px; line-height: 28px; font-size: 14px; }
            .score-box, .timer-box, .silence-box { padding: 4px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="score-box">🍃 积分: <span id="scoreVal">0</span></div>
        <div class="silence-box">🌿 寂静值: <span id="silenceVal">100</span>%</div>
        <div class="timer-box">⏱️ <span id="timerVal">60</span>s</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<div id="worldMapPanel" class="world-map" style="display: none;"></div>

<script>
    (function(){
        // ---------- 画布与上下文 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let canvasWidth, canvasHeight;
        
        // 动态适配
        function resizeCanvas() {
            let width = window.innerWidth - 24;
            if(width > 500) width = 500;
            let height = width * 1.2;
            if(height > window.innerHeight - 100) {
                height = window.innerHeight - 100;
                width = height / 1.2;
            }
            canvas.width = width;
            canvas.height = height;
            canvasWidth = width;
            canvasHeight = height;
        }
        resizeCanvas();
        window.addEventListener('resize', ()=> { if(!gameRunning) resizeCanvas(); });
        
        // ----- 游戏阶段 -----
        let stage = 1;          // 1:聆听模式, 2:噪音入侵, 3:光环扩张, 4:地图解锁, 5:立法事件, 6:终局保护区
        let gameRunning = true;
        let score = 0;          // 积分用于升级地图/立法
        let silence = 100;      // 寂静值 0-100
        let timeLeft = 60;
        let timerInterval = null;
        
        // 物品数组
        let items = [];
        let spawnCounter = 0;
        let baseSpawnDelay = 20; // 帧间隔
        let currentSpawnDelay = 20;
        
        // 光环半径
        let auraRadius = 60;    // 初始中心圆半径60
        const minAura = 60;
        let maxAura = Math.min(canvasWidth, canvasHeight)*0.45;
        
        // 世界地图数据
        let mapPoints = [
            { name:"亚马逊", status:"red", value:0, max:100, x:0, y:0 },
            { name:"阿尔卑斯", status:"red", value:0, max:100, x:0, y:0 },
            { name:"日本屋久岛", status:"red", value:0, max:100, x:0, y:0 },
            { name:"落基山脉", status:"red", value:0, max:100, x:0, y:0 },
            { name:"台湾山林", status:"red", value:0, max:100, x:0, y:0 }
        ];
        let mapUnlocked = false;
        
        // 立法事件相关
        let lawEventActive = false;
        let lawTimer = null;
        let lawInterval = null; // 随机触发
        let lawResistCount = 0;
        
        // 聆听模式: 寂静点
        let listeningPoints = [];
        let foundPoints = 0;
        let totalPointsNeeded = 3;
        
        // 中心坐标
        let centerX = canvasWidth/2, centerY = canvasHeight/2;
        let centerRadius = 60;
        
        // 音频合成
        let audioCtx = null;
        let bgmSource = null;
        let ambientInterval = null;
        
        function initAudio() {
            if(!audioCtx && window.AudioContext) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(freq, duration, vol=0.2) {
            if(!audioCtx) return;
            try{
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = vol;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now+duration);
                osc.stop(now+duration);
            }catch(e){}
        }
        
        function playPlaneSound() {
            if(!audioCtx) return;
            try{
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 200;
                gain.gain.value = 0.3;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now+2);
                osc.stop(now+2);
                // 再叠一个低音
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 80;
                gain2.gain.value = 0.2;
                osc2.start();
                gain2.gain.exponentialRampToValueAtTime(0.0001, now+2);
                osc2.stop(now+2);
            }catch(e){}
        }
        
        function playNaturalAmbient() {
            if(!audioCtx) return;
            if(ambientInterval) clearInterval(ambientInterval);
            ambientInterval = setInterval(()=>{
                if(!gameRunning) return;
                if(Math.random()<0.2){
                    playSound(700+Math.random()*300, 0.2, 0.05);
                }
            }, 3000);
        }
        
        function stopAmbient() {
            if(ambientInterval) clearInterval(ambientInterval);
        }
        
        // 绘制函数 ==========================
        function drawBackground() {
            // 森林渐变
            const grad = ctx.createLinearGradient(0,0,0,canvasHeight);
            grad.addColorStop(0,"#2d5a3b");
            grad.addColorStop(1,"#1d3e2a");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvasWidth,canvasHeight);
            // 画一些树木剪影
            ctx.fillStyle = "#1e3a1e";
            for(let i=0;i<12;i++){
                ctx.fillRect(40+i*70, canvasHeight-100, 15, 80);
            }
        }
        
        function drawCenter() {
            ctx.beginPath();
            ctx.arc(centerX, centerY, centerRadius, 0, Math.PI*2);
            ctx.fillStyle = "#f4e3b1";
            ctx.fill();
            ctx.strokeStyle = "#c9a87b";
            ctx.lineWidth=3;
            ctx.stroke();
            ctx.fillStyle = "#5d3a1a";
            ctx.font = `bold ${Math.max(14, centerRadius*0.28)}px system-ui`;
            ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText("🌿 寂静地", centerX, centerY);
            // 光环
            if(stage>=3){
                ctx.beginPath();
                ctx.arc(centerX, centerY, auraRadius, 0, Math.PI*2);
                ctx.fillStyle = "rgba(200,230,150,0.2)";
                ctx.fill();
                ctx.strokeStyle = "#7cb518";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        function drawItems() {
            for(let it of items){
                ctx.drawImage(it.img, it.x, it.y, it.size, it.size);
            }
        }
        
        function drawListeningPoints() {
            for(let p of listeningPoints){
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,200,0.6)";
                ctx.fill();
                ctx.fillStyle = "#2c5e2e";
                ctx.font = "bold 20px sans-serif";
                ctx.fillText("🔊", p.x-8, p.y+8);
            }
        }
        
        function drawUI() {
            if(stage>=2 && silence>=0){
                ctx.fillStyle = "#1e3a2a";
                ctx.fillRect(20, 20, 200, 20);
                ctx.fillStyle = "#4caf50";
                ctx.fillRect(20, 20, 2*silence, 20);
                ctx.fillStyle = "white";
                ctx.font = "12px monospace";
                ctx.fillText("寂静值", 24, 18);
            }
            // 积分显示
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('silenceVal').innerText = Math.floor(silence);
            document.getElementById('timerVal').innerText = timeLeft;
        }
        
        // 更新逻辑
        function updateItems() {
            for(let i=0;i<items.length;i++){
                let it = items[i];
                // 速度调整：光环内减速/加速
                let distToCenter = Math.hypot(it.x+it.size/2 - centerX, it.y+it.size/2 - centerY);
                let speedMult = 1;
                if(stage>=3 && distToCenter < auraRadius){
                    if(it.type === 'noise') speedMult = 0.6;
                    else speedMult = 1.4;
                }
                it.x += it.vx * speedMult;
                it.y += it.vy * speedMult;
                // 碰撞中心
                let centerDist = Math.hypot(it.x+it.size/2 - centerX, it.y+it.size/2 - centerY);
                if(centerDist < centerRadius + it.size/2){
                    if(it.type === 'natural'){
                        score += 1;
                        silence = Math.min(100, silence+2);
                        playSound(880, 0.2, 0.2);
                        if(stage>=3){
                            auraRadius = Math.min(maxAura, auraRadius+3);
                        }
                    }else{
                        silence = Math.max(0, silence-10);
                        playSound(120, 0.3, 0.3);
                        if(silence<=0) gameLose("寂静被完全破坏...");
                    }
                    items.splice(i,1);
                    i--;
                    continue;
                }
                // 超出边界移除
                if(it.x+it.size < -150 || it.x > canvasWidth+150 || it.y+it.size<-150 || it.y>canvasHeight+150){
                    items.splice(i,1);
                    i--;
                }
            }
        }
        
        function spawnItem() {
            if(stage<2) return;
            let isNatural = Math.random()<0.6;
            let img = isNatural ? naturalImg : noiseImg;
            let size = 44;
            let edge = Math.floor(Math.random()*4);
            let x,y;
            if(edge===0){ x=-size; y=Math.random()*canvasHeight; }
            else if(edge===1){ x=canvasWidth+size; y=Math.random()*canvasHeight; }
            else if(edge===2){ x=Math.random()*canvasWidth; y=-size; }
            else { x=Math.random()*canvasWidth; y=canvasHeight+size; }
            let dx = centerX - x, dy = centerY - y;
            let len = Math.hypot(dx,dy);
            let vx = dx/len * 2.5, vy = dy/len * 2.5;
            items.push({x,y,vx,vy,img,size,type: isNatural ? 'natural':'noise'});
        }
        
        // 图片生成（简单圆形图标）
        let naturalImg, noiseImg;
        function createPlaceholderIcon(color, emoji){
            let off = document.createElement('canvas');
            off.width = 64; off.height=64;
            let octx = off.getContext('2d');
            octx.fillStyle=color;
            octx.beginPath();
            octx.arc(32,32,28,0,Math.PI*2);
            octx.fill();
            octx.fillStyle='white';
            octx.font='32px sans-serif';
            octx.fillText(emoji, 18, 46);
            let img = new Image();
            img.src = off.toDataURL();
            return img;
        }
        naturalImg = createPlaceholderIcon('#2e7d32','🦋');
        noiseImg = createPlaceholderIcon('#b71c1c','📱');
        
        // 聆听模式初始化
        function initListeningMode(){
            listeningPoints = [];
            for(let i=0;i<5;i++){
                listeningPoints.push({
                    x: 80 + Math.random()*(canvasWidth-160),
                    y: 80 + Math.random()*(canvasHeight-160),
                    found: false
                });
            }
            foundPoints = 0;
            playNaturalAmbient();
        }
        
        function checkListeningHit(mx,my){
            for(let p of listeningPoints){
                if(!p.found && Math.hypot(mx-p.x, my-p.y)<20){
                    p.found = true;
                    foundPoints++;
                    playSound(660,0.3,0.3);
                    showToast("✨ 这里有一平方英寸的寂静，它非常珍贵", 1500);
                    if(foundPoints>=totalPointsNeeded){
                        // 进入第二阶段
                        stage=2;
                        stopAmbient();
                        playPlaneSound();
                        showToast("✈️ 噪音入侵！保护寂静之地！", 2000);
                        startTimer();
                        // 隐藏聆听点
                        listeningPoints=[];
                        // 生成噪音
                        for(let i=0;i<3;i++) spawnItem();
                    }
                    break;
                }
            }
        }
        
        function startTimer(){
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(()=>{
                if(!gameRunning) return;
                if(timeLeft<=1){
                    timeLeft=0;
                    if(silence>0 && stage<6) gameWinByTime();
                    else gameLose("时间耗尽");
                } else {
                    timeLeft--;
                }
            },1000);
        }
        
        function gameWinByTime(){
            if(stage>=6) return;
            showToast("时间到！你守护了寂静，但更大的使命在前方...", 2000);
            if(stage>=4 && mapPoints.every(p=>p.status==='green') && lawResistCount>=2 && silence>=80){
                startFinalProtection();
            } else {
                gameLose("寂静未能完全守护，需要更多努力");
            }
        }
        
        function gameLose(msg){
            gameRunning=false;
            if(timerInterval) clearInterval(timerInterval);
            stopAmbient();
            alert(msg + " 点击确定重新开始");
            location.reload();
        }
        
        function showToast(msg, duration){
            let div = document.createElement('div');
            div.className = 'event-toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(()=>div.remove(), duration);
        }
        
        // 世界地图UI
        function updateWorldMapUI(){
            let panel = document.getElementById('worldMapPanel');
            if(stage>=4 && !mapUnlocked){
                mapUnlocked=true;
                panel.style.display='flex';
                renderMapDots();
            }
        }
        function renderMapDots(){
            let panel = document.getElementById('worldMapPanel');
            panel.innerHTML='';
            mapPoints.forEach((pt,idx)=>{
                let dot = document.createElement('div');
                dot.className = `map-dot ${pt.status}`;
                dot.innerText = pt.status==='green'?'✓':(pt.status==='yellow'?'🟡':'🔴');
                dot.onclick = (e)=>{
                    e.stopPropagation();
                    if(stage>=4 && pt.status!=='green'){
                        let cost = 30;
                        if(score>=cost){
                            score -= cost;
                            pt.value = Math.min(pt.max, pt.value+20);
                            if(pt.value>=pt.max) {
                                pt.status='green';
                                dot.className='map-dot green';
                                dot.innerText='✓';
                                playSound(880,0.2);
                                showToast(`${pt.name} 寂静恢复!`, 1000);
                                if(mapPoints.every(p=>p.status==='green')) showToast("所有寂静点已点亮！", 1500);
                            } else {
                                if(pt.value>50) pt.status='yellow';
                                dot.className='map-dot yellow';
                                dot.innerText='🟡';
                            }
                        } else {
                            showToast("积分不足",800);
                        }
                    }
                };
                panel.appendChild(dot);
            });
        }
        
        // 立法事件
        function startLawEventRandom(){
            if(stage<5) return;
            if(lawEventActive) return;
            lawInterval = setInterval(()=>{
                if(!gameRunning) return;
                if(stage>=5 && !lawEventActive && Math.random()<0.02){
                    showLawPopup();
                }
            }, 15000);
        }
        function showLawPopup(){
            lawEventActive=true;
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-card">
                    <h2>🏛️ 立法危机</h2>
                    <p>「国会提议取消自然保护区的噪音限制！」</p>
                    <button id="resistBtn">🌿 游说议员 (花费40积分)</button>
                    <button id="ignoreBtn">⚠️ 放任不管</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('resistBtn').onclick = ()=>{
                if(score>=40){
                    score-=40;
                    lawResistCount++;
                    showToast("法案被否决！制度保护了寂静", 1500);
                    playSound(800,0.2);
                } else {
                    showToast("积分不足，无法游说",1000);
                    // 强制惩罚
                    silence = Math.max(0, silence-20);
                    currentSpawnDelay = Math.max(8, currentSpawnDelay-5);
                    setTimeout(()=>{ currentSpawnDelay=baseSpawnDelay; },15000);
                }
                modal.remove();
                lawEventActive=false;
            };
            document.getElementById('ignoreBtn').onclick = ()=>{
                silence = Math.max(0, silence-20);
                currentSpawnDelay = Math.max(8, currentSpawnDelay-5);
                setTimeout(()=>{ currentSpawnDelay=baseSpawnDelay; },15000);
                showToast("法案通过！噪音加剧，寂静值下降",1500);
                modal.remove();
                lawEventActive=false;
            };
        }
        
        // 最终保护区划定
        function startFinalProtection(){
            stage=6;
            gameRunning=false;
            if(timerInterval) clearInterval(timerInterval);
            stopAmbient();
            // 绘制界面
            let drawDiv = document.createElement('div');
            drawDiv.className = 'draw-area';
            let desc = document.createElement('p');
            desc.innerText = '划定永久寂静保护区：用手指/鼠标画一个封闭区域';
            desc.style.color='white';
            desc.style.marginBottom='16px';
            let drawCanvas = document.createElement('canvas');
            drawCanvas.width = Math.min(500,canvasWidth);
            drawCanvas.height = drawCanvas.width*0.6;
            drawCanvas.className = 'draw-canvas';
            let dctx = drawCanvas.getContext('2d');
            dctx.fillStyle = '#aad4aa';
            dctx.fillRect(0,0,drawCanvas.width,drawCanvas.height);
            let painting = false;
            let points = [];
            drawCanvas.onmousedown = (e)=>{ painting=true; points=[]; };
            drawCanvas.onmousemove = (e)=>{
                if(!painting) return;
                let rect=drawCanvas.getBoundingClientRect();
                let x = (e.clientX-rect.left)*drawCanvas.width/rect.width;
                let y = (e.clientY-rect.top)*drawCanvas.height/rect.height;
                points.push({x,y});
                dctx.beginPath();
                dctx.arc(x,y,3,0,Math.PI*2);
                dctx.fillStyle='blue';
                dctx.fill();
            };
            drawCanvas.onmouseup = ()=>{
                painting=false;
                if(points.length>5){
                    dctx.beginPath();
                    dctx.moveTo(points[0].x,points[0].y);
                    for(let p of points) dctx.lineTo(p.x,p.y);
                    dctx.closePath();
                    dctx.fillStyle = 'rgba(100,200,100,0.3)';
                    dctx.fill();
                    dctx.strokeStyle='green';
                    dctx.lineWidth=3;
                    dctx.stroke();
                    let area = Math.abs(points.reduce((sum,p,i,a)=> sum + (p.x*a[(i+1)%a.length].y - p.y*a[(i+1)%a.length].x),0)/2);
                    let name = prompt("为你的保护区命名:", "寂静之域");
                    if(!name) name="寂静之域";
                    alert(`🎉 恭喜！你建立了永久寂静保护区「${name}」面积约${Math.floor(area)} 平方像素。\n感谢你的守护！`);
                    location.reload();
                }
            };
            drawCanvas.ontouchstart = (e)=> { e.preventDefault(); painting=true; points=[]; };
            drawCanvas.ontouchmove = (e)=>{
                e.preventDefault();
                let rect=drawCanvas.getBoundingClientRect();
                let touch=e.touches[0];
                let x = (touch.clientX-rect.left)*drawCanvas.width/rect.width;
                let y = (touch.clientY-rect.top)*drawCanvas.height/rect.height;
                points.push({x,y});
                dctx.beginPath();
                dctx.arc(x,y,3,0,Math.PI*2);
                dctx.fillStyle='blue';
                dctx.fill();
            };
            drawCanvas.ontouchend = (e)=> drawCanvas.onmouseup();
            drawDiv.appendChild(desc);
            drawDiv.appendChild(drawCanvas);
            document.body.appendChild(drawDiv);
        }
        
        // 动画主循环
        let animationId;
        function gameLoop(){
            if(!gameRunning) return;
            // 生成图标
            if(stage>=2){
                spawnCounter++;
                if(spawnCounter >= currentSpawnDelay){
                    spawnCounter=0;
                    spawnItem();
                    if(items.length>40) items.splice(0,10);
                }
                updateItems();
                // 寂静值归零失败
                if(silence<=0) gameLose("寂静消失...");
            }
            drawBackground();
            if(stage===1){
                drawListeningPoints();
            }
            drawItems();
            drawCenter();
            drawUI();
            // 绘制光环额外提示
            if(stage>=3){
                ctx.font="12px sans-serif";
                ctx.fillStyle="#ffecb3";
                ctx.fillText("光环扩大: 噪音减速,自然声加速", centerX-80, centerY-auraRadius-5);
            }
            if(stage>=4 && mapUnlocked) updateWorldMapUI();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 交互
        function handleHit(clientX, clientY){
            let rect = canvas.getBoundingClientRect();
            let sx = canvasWidth/rect.width, sy = canvasHeight/rect.height;
            let mx = (clientX-rect.left)*sx, my = (clientY-rect.top)*sy;
            if(stage===1){
                checkListeningHit(mx,my);
                return;
            }
            if(stage>=2){
                for(let i=items.length-1;i>=0;i--){
                    let it = items[i];
                    if(mx>=it.x && mx<=it.x+it.size && my>=it.y && my<=it.y+it.size){
                        if(it.type === 'natural'){
                            score += 1;
                            silence = Math.min(100, silence+2);
                            if(stage>=3) auraRadius = Math.min(maxAura, auraRadius+2);
                            playSound(880,0.15,0.2);
                        } else {
                            // 点击噪音拦截成功
                            playSound(180,0.1,0.1);
                        }
                        items.splice(i,1);
                        break;
                    }
                }
            }
        }
        
        canvas.addEventListener('click',(e)=>handleHit(e.clientX,e.clientY));
        canvas.addEventListener('touchstart',(e)=>{
            e.preventDefault();
            let t=e.touches[0];
            handleHit(t.clientX,t.clientY);
        },{passive:false});
        
        // 启动游戏
        function init(){
            resizeCanvas();
            centerX = canvasWidth/2; centerY = canvasHeight/2;
            centerRadius = Math.min(60, canvasWidth*0.12);
            auraRadius = centerRadius;
            maxAura = Math.min(canvasWidth, canvasHeight)*0.45;
            initAudio();
            initListeningMode();
            stage=1;
            gameRunning=true;
            currentSpawnDelay = baseSpawnDelay;
            // 延迟解锁阶段4世界地图UI条件，需要score积累
            setInterval(()=>{
                if(stage===2 && score>=50 && !mapUnlocked) stage=3;
                if(stage===3 && score>=80 && !mapUnlocked) stage=4;
                if(stage===4 && !lawInterval) startLawEventRandom();
                if(stage===4 && mapPoints.every(p=>p.status==='green')) stage=5;
                if(stage===5 && lawResistCount>=1 && silence>=70 && score>=100) stage=6; 
            }, 500);
            gameLoop();
        }
        init();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一平方英寸的寂静 · 守护之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0e2a1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            padding: 0;
            margin: 0;
        }
        .game-wrapper {
            background: #1e4a2e;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            flex: 1;
            border-radius: 24px;
            background: #2c5e3a;
            cursor: crosshair;
            touch-action: none;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            gap: 12px;
            color: #f7f3df;
            text-shadow: 1px 1px 0 #1e3a2a;
            font-weight: bold;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }
        .hud-item {
            background: #1e3a2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .card {
            background: #fef7e0;
            width: 85%;
            max-width: 340px;
            border-radius: 48px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
            border: 1px solid #ddcca0;
        }
        .card h1 { font-size: 1.6rem; color: #2c5e2e; margin-bottom: 16px; }
        .rule-line { background: #ece4cc; border-radius: 28px; padding: 12px; margin: 12px 0; font-size: 0.8rem; text-align: left; }
        .rule-line p { margin: 6px 0; }
        .btn {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #2c5e2e;
            margin-top: 12px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2c5e2e; }
        .toast {
            position: fixed;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a2a;
            color: #ffecb3;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 300;
            white-space: nowrap;
            animation: fadeUp 2s ease forwards;
            pointer-events: none;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        }
        .glow-ring {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(140, 220, 140, 0.9);
            background: radial-gradient(circle, rgba(100,200,100,0.25), transparent);
            transform: translate(-50%,-50%);
            animation: pulse 2.2s infinite;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: translate(-50%,-50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
            100% { opacity: 0.4; transform: translate(-50%,-50%) scale(0.8); }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="hud">
        <div class="hud-item">🎧 寂静值 <span id="silenceVal">0</span>%</div>
        <div class="hud-item">⏱️ 倒计时 <span id="timerVal">60</span>s</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<!-- 规则说明界面 -->
<div id="rulesModal" class="modal">
    <div class="card">
        <h1>🌿 守护一平方英寸的寂静</h1>
        <div class="rule-line">
            <p>🟢 <strong>自然声</strong> 飞入中心 → <span style="color:green;">+10 寂静值</span></p>
            <p>🟢 误触自然声 → <span style="color:red;">-1 寂静值</span></p>
            <p>🔴 <strong>噪音</strong> 飞入中心 → <span style="color:red;">-10 寂静值</span></p>
            <p>🔴 点击噪音 → 成功拦截 (0损失)</p>
        </div>
        <p>寂静值达到100%后会出现绿色光环，光环内噪音减速。<br>倒计时结束寂静值≥100%则胜利。</p>
        <button class="btn" id="startJourney">🌱 进入寂静之旅</button>
    </div>
</div>

<script>
(function() {
    // ----- 画布元素 -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let canvasW, canvasH;
    let centerX, centerY;
    let centerR = 0;
    let itemSize = 0;
    let maxAura = 0;

    // ----- 游戏状态 -----
    let gamePhase = 'listen';
    let listenPoints = [];
    let foundCount = 0;
    const NEED_LISTEN = 3;

    let silence = 0;               // 初始为0
    let timeLeft = 60;
    let timerInterval = null;
    let gameActive = false;
    let animationId = null;

    let entities = [];
    let spawnCounter = 0;
    let SPAWN_DELAY = 45;

    let audioCtx = null;
    let ambientInterval = null;

    // ----- 辅助函数 -----
    function resizeCanvas() {
        const wrapper = canvas.parentElement;
        const hud = document.querySelector('.hud');
        const hudHeight = hud ? hud.offsetHeight : 0;
        const availableHeight = wrapper.clientHeight - hudHeight - 16;
        const availableWidth = wrapper.clientWidth - 16;
        canvas.width = availableWidth;
        canvas.height = availableHeight;
        canvasW = availableWidth;
        canvasH = availableHeight;
        centerX = canvasW / 2;
        centerY = canvasH / 2;
        // 中心圆放大 1/3 (原 min(40,...) -> 乘以1.33)
        centerR = Math.min(53, canvasW * 0.12, canvasH * 0.16);
        itemSize = Math.min(36, canvasW * 0.08, canvasH * 0.1);
        maxAura = Math.min(canvasW, canvasH) * 0.65;
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        if(gamePhase === 'listen') drawListenMessage();
    });

    function initAudio() {
        if(!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(freq, dur, vol=0.2) {
        if(!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
            osc.start();
            osc.stop(now+dur);
        } catch(e) {}
    }

    function playPlaneSound() {
        if(!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.linearRampToValueAtTime(240, now+1.8);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.25, now+0.4);
            gain.gain.linearRampToValueAtTime(0.01, now+2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now+2);
        } catch(e) {}
    }

    function showToast(msg, duration=1800) {
        const div = document.createElement('div');
        div.className = 'toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), duration);
    }

    // ----- 聆听模式 -----
    function initListenMode() {
        const oldRings = document.querySelectorAll('.glow-ring');
        oldRings.forEach(r => r.remove());
        listenPoints = [];

        const canvasRect = canvas.getBoundingClientRect();
        const parentRect = canvas.parentElement.getBoundingClientRect();
        const offsetX = canvasRect.left - parentRect.left;
        const offsetY = canvasRect.top - parentRect.top;

        const minX = offsetX + 20;
        const maxX = offsetX + canvasRect.width - 20;
        const minY = offsetY + 20;
        const maxY = offsetY + canvasRect.height - 20;

        for(let i = 0; i < NEED_LISTEN + 1; i++) {
            const x = minX + Math.random() * (maxX - minX);
            const y = minY + Math.random() * (maxY - minY);
            listenPoints.push({ x, y, id: i });
            const ring = document.createElement('div');
            ring.className = 'glow-ring';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            canvas.parentElement.appendChild(ring);
        }

        foundCount = 0;
        gamePhase = 'listen';
        gameActive = false;

        if(ambientInterval) clearInterval(ambientInterval);
        ambientInterval = setInterval(() => {
            if(gamePhase === 'listen' && audioCtx) {
                playSound(500 + Math.random()*400, 0.2, 0.05);
            }
        }, 2500);
        drawListenMessage();
    }

    function drawListenMessage() {
        ctx.clearRect(0, 0, canvasW, canvasH);
        ctx.fillStyle = '#2c5e3a';
        ctx.fillRect(0, 0, canvasW, canvasH);
        ctx.fillStyle = '#e0e8c0';
        ctx.font = `bold ${Math.max(18, canvasW*0.05)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText('🌲 聆听森林的寂静 🌲', centerX, centerY - 20);
        ctx.font = `${Math.max(14, canvasW*0.04)}px system-ui`;
        ctx.fillStyle = '#c0e0a0';
        ctx.fillText('点击闪烁的光圈', centerX, centerY + 20);
    }

    function handleListenTap(clientX, clientY) {
        const parentRect = canvas.parentElement.getBoundingClientRect();
        const clickX = clientX - parentRect.left;
        const clickY = clientY - parentRect.top;

        for(let i = 0; i < listenPoints.length; i++) {
            const p = listenPoints[i];
            const dist = Math.hypot(clickX - p.x, clickY - p.y);
            if(dist < 35) {
                listenPoints.splice(i,1);
                const rings = document.querySelectorAll('.glow-ring');
                for(let ring of rings) {
                    const left = parseFloat(ring.style.left);
                    const top = parseFloat(ring.style.top);
                    if(Math.abs(left - p.x) < 5 && Math.abs(top - p.y) < 5) {
                        ring.remove();
                        break;
                    }
                }
                foundCount++;
                showToast(`✨ 这里有一平方英寸的寂静，它非常珍贵。 (${foundCount}/${NEED_LISTEN})`, 1800);
                if(foundCount >= NEED_LISTEN) {
                    gamePhase = 'transition';
                    if(ambientInterval) clearInterval(ambientInterval);
                    showToast("✈️ 远处传来飞机的轰鸣...", 2000);
                    playPlaneSound();
                    setTimeout(() => {
                        document.querySelectorAll('.glow-ring').forEach(r => r.remove());
                        startGameCore();
                    }, 2000);
                }
                break;
            }
        }
    }

    // ----- 核心游戏 -----
    function startGameCore() {
        resizeCanvas();
        silence = 0;            // 初始寂静值为0
        timeLeft = 60;
        entities = [];
        spawnCounter = 0;
        gameActive = true;
        gamePhase = 'playing';
        updateUI();

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            if(timeLeft <= 1) {
                timeLeft = 0;
                updateUI();
                endGame();
            } else {
                timeLeft--;
                updateUI();
            }
        }, 1000);

        if(animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(drawLoop);
    }

    function spawnEntity() {
        if(!gameActive) return;
        const isNatural = Math.random() < 0.55;
        const emoji = isNatural ?
            ['🐦','🦋','🌿','💧','🍃'][Math.floor(Math.random()*5)] :
            ['✈️','📱','🚗','🔊','🏗️'][Math.floor(Math.random()*5)];
        const size = itemSize;
        const edge = Math.floor(Math.random()*4);
        let x, y, vx, vy;
        const speedBase = 0.65 * (canvasW / 400);
        if(edge === 0) { x = -size; y = Math.random() * canvasH; vx = speedBase * 0.6; vy = (centerY - y) * 0.004; }
        else if(edge === 1) { x = canvasW + size; y = Math.random() * canvasH; vx = -speedBase * 0.6; vy = (centerY - y) * 0.004; }
        else if(edge === 2) { x = Math.random() * canvasW; y = -size; vx = (centerX - x) * 0.004; vy = speedBase * 0.6; }
        else { x = Math.random() * canvasW; y = canvasH + size; vx = (centerX - x) * 0.004; vy = -speedBase * 0.6; }
        entities.push({
            x, y, vx, vy, size,
            emoji, type: isNatural ? 'natural' : 'noise'
        });
    }

    function updateEntities() {
        const hitDist = centerR + 12;
        for(let i=0; i<entities.length; i++) {
            const e = entities[i];
            let speedMul = 1;
            // 光环仅在寂静值≥100时存在，且半径随寂静值比例扩展
            const auraR = getAuraRadius();
            if(auraR > 0) {
                const distToCenter = Math.hypot(e.x + e.size/2 - centerX, e.y + e.size/2 - centerY);
                if(distToCenter < auraR && e.type === 'noise') {
                    speedMul = 0.4;
                }
            }
            e.x += e.vx * speedMul;
            e.y += e.vy * speedMul;
            const dist = Math.hypot(e.x + e.size/2 - centerX, e.y + e.size/2 - centerY);
            if(dist < hitDist) {
                if(e.type === 'natural') {
                    silence = Math.min(100, silence + 10);
                    playSound(880, 0.2, 0.2);
                    showToast('🌿 自然之声 +10', 600);
                } else {
                    silence = Math.max(0, silence - 10);
                    playSound(140, 0.25, 0.3);
                    showToast('💥 噪音污染 -10', 600);
                    if(silence <= 0) endGame(false);
                }
                updateUI();
                entities.splice(i,1);
                i--;
                continue;
            }
            if(e.x + e.size < -200 || e.x > canvasW+200 || e.y + e.size < -200 || e.y > canvasH+200) {
                entities.splice(i,1);
                i--;
            }
        }
    }

    // 光环半径：寂静值0-100对应0到maxAura*0.7，只有≥100才出现（但半径正比于min(100, silence)/100）
    function getAuraRadius() {
        if(silence <= 0) return 0;
        let ratio = Math.min(1, silence / 100);
        return maxAura * 0.7 * ratio;
    }

    // 绘制实体（自然绿底，噪音红底）
    function drawEntity(e) {
        const x = e.x, y = e.y, size = e.size;
        if(e.type === 'noise') {
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
            ctx.fillStyle = '#c0392b';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = `${size-4}px "Segoe UI Emoji"`;
            ctx.fillText(e.emoji, x + size/2 - 10, y + size/2 + 6);
        } else {
            ctx.beginPath();
            ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI*2);
            ctx.fillStyle = '#2e7d32';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = `${size-4}px "Segoe UI Emoji"`;
            ctx.fillText(e.emoji, x + size/2 - 10, y + size/2 + 6);
        }
    }

    function handleTap(clientX, clientY) {
        if(gamePhase !== 'playing' || !gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvasW / rect.width;
        const scaleY = canvasH / rect.height;
        const tapX = (clientX - rect.left) * scaleX;
        const tapY = (clientY - rect.top) * scaleY;
        const hitMargin = 12;
        for(let i=0; i<entities.length; i++) {
            const e = entities[i];
            if(tapX >= e.x - hitMargin && tapX <= e.x + e.size + hitMargin &&
               tapY >= e.y - hitMargin && tapY <= e.y + e.size + hitMargin) {
                if(e.type === 'natural') {
                    silence = Math.max(0, silence - 1);
                    playSound(330, 0.2, 0.15);
                    showToast('🙊 误触自然 -1', 600);
                } else {
                    playSound(200, 0.1, 0.1);
                    showToast('🛡️ 拦截噪音', 400);
                }
                entities.splice(i,1);
                updateUI();
                break;
            }
        }
    }

    function updateUI() {
        document.getElementById('silenceVal').innerText = Math.floor(silence);
        document.getElementById('timerVal').innerText = Math.floor(timeLeft);
    }

    function endGame() {
        if(!gameActive) return;
        gameActive = false;
        if(timerInterval) clearInterval(timerInterval);
        const success = (timeLeft <= 0 && silence >= 100);
        const msg = success ? "🎉 成功守护寂静！" : "💔 寂静被噪音吞没...";
        showToast(msg, 2500);
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="card">
                <h2>${success ? "✨ 胜利 ✨" : "❌ 失败"}</h2>
                <p>${success ? "你让寂静之环绽放，保护区初具雏形。" : "噪音侵蚀了最后一片寂静。"}</p>
                <button class="btn" id="replayGame">🔄 再次守护</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('replayGame').onclick = () => {
            modal.remove();
            resetFullGame();
        };
        if(animationId) cancelAnimationFrame(animationId);
    }

    function resetFullGame() {
        if(timerInterval) clearInterval(timerInterval);
        if(ambientInterval) clearInterval(ambientInterval);
        if(animationId) cancelAnimationFrame(animationId);
        gameActive = false;
        gamePhase = 'listen';
        entities = [];
        silence = 0;
        timeLeft = 60;
        updateUI();
        initListenMode();
    }

    function drawGame() {
        ctx.clearRect(0,0,canvasW,canvasH);
        const grad = ctx.createLinearGradient(0,0,0,canvasH);
        grad.addColorStop(0,"#1e4a2e");
        grad.addColorStop(1,"#0e2a1f");
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvasW,canvasH);
        for(const e of entities) drawEntity(e);
        // 中心圆（已放大）
        ctx.beginPath();
        ctx.arc(centerX, centerY, centerR, 0, Math.PI*2);
        ctx.fillStyle = "#f9efc0";
        ctx.fill();
        ctx.strokeStyle = "#8cb87a";
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = "#1e3a2a";
        ctx.font = `bold ${Math.max(16, centerR*0.55)}px system-ui`;
        ctx.fillText("🌿", centerX-12, centerY+6);
        // 光环（寂静值≥100才显示半径>0）
        const auraR = getAuraRadius();
        if(auraR > 5) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, auraR, 0, Math.PI*2);
            ctx.fillStyle = "rgba(100, 200, 100, 0.12)";
            ctx.fill();
            ctx.strokeStyle = "#80c080";
            ctx.setLineDash([6, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    function drawLoop() {
        if(gamePhase === 'listen') {
            drawListenMessage();
            requestAnimationFrame(drawLoop);
            return;
        }
        if(!gameActive) {
            requestAnimationFrame(drawLoop);
            return;
        }
        spawnCounter++;
        if(spawnCounter >= SPAWN_DELAY) {
            spawnCounter = 0;
            spawnEntity();
            if(entities.length > 35) entities.splice(0,8);
        }
        updateEntities();
        drawGame();
        requestAnimationFrame(drawLoop);
    }

    function bindEvents() {
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            if(gamePhase === 'listen') handleListenTap(e.clientX, e.clientY);
            else if(gamePhase === 'playing') handleTap(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if(gamePhase === 'listen') handleListenTap(touch.clientX, touch.clientY);
            else if(gamePhase === 'playing') handleTap(touch.clientX, touch.clientY);
        }, { passive: false });
    }

    function startGame() {
        resizeCanvas();
        initAudio();
        bindEvents();
        initListenMode();
        drawLoop();
    }

    document.getElementById('startJourney').onclick = () => {
        document.getElementById('rulesModal').style.display = 'none';
        startGame();
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    };

    resizeCanvas();
})();
</script>
</body>
</html>

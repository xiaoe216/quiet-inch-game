<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>守护一平方英寸 · 手机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1a3f2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 12px;
        }

        .game-container {
            background: #2c5e3a;
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            background: #3c6e47;
            touch-action: manipulation;
            width: 100%;
            height: auto;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px 12px 12px;
            color: #f9f1cf;
            font-weight: bold;
            text-shadow: 1px 1px 0 #1e3a2a;
        }

        .score-box, .timer-box {
            background: #1e3a2a;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 1.4rem;
            backdrop-filter: blur(4px);
        }

        .score-box span, .timer-box span {
            font-size: 0.8rem;
            margin-right: 6px;
        }

        /* 开始/结束弹窗 - 手机友好 */
        .start-screen, .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .card {
            background: #fff9ef;
            width: 85%;
            max-width: 320px;
            border-radius: 48px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid #e0c8a0;
        }

        .card h1 {
            font-size: 1.8rem;
            color: #2c5e2e;
            margin-bottom: 12px;
        }

        .card p {
            color: #4a3a2a;
            margin-bottom: 20px;
            line-height: 1.4;
            font-size: 0.9rem;
        }

        .rule-badge {
            .rule-badge {
    background: #e6ddcc;
    border-radius: 28px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 0.8rem;
    line-height: 1.5;
    text-align: left;
}
.rule-badge span {
    display: block;
    margin-bottom: 10px;
}
.rule-badge span:last-child {
    margin-bottom: 0;
}
.card p {
    <div class="rule-badge">
    <span>🟢 <strong>自然声</strong> → 让它飞入中心 <span style="color:green;">+1</span> &nbsp; 点击则 <span style="color:red;">-1</span></span>
    <span>🔴 <strong>噪音</strong> → 点击拦截 <span style="color:darkgreen;">0分</span> &nbsp; 飘入中心则 <span style="color:red;">-1</span></span>
</div>
}
        }

        .rule-badge span {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .btn {
            background: #4f8a4b;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #2c5e2e;
            margin-top: 8px;
            width: 80%;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2c5e2e;
        }

        .footer-credit {
            position: fixed;
            bottom: 8px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            color: #ddd;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="score-box"><span>🍃 寂静指数</span> <span id="scoreValue">0</span></div>
        <div class="timer-box"><span>⏱️ 剩余</span> <span id="timerValue">60</span><span>s</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="startScreen" class="start-screen">
    <div class="card">
        <h1>🌿 守护一平方英寸</h1>
        <div class="rule-badge">
            <span>🟢 <strong>自然声</strong> → 让它飞入中心 <span style="color:green;">+1</span><br>❌ 点击它则 <span style="color:red;">-1</span></span>
            <span>🔴 <strong>噪音</strong> → 点击它拦截 <span style="color:darkgreen;">0分</span><br>⚠️ 让噪音进入中心则 <span style="color:red;">-1</span></span>
        </div>
        <p>看见红色<strong>必须点掉</strong>，看见绿色<strong>千万别点</strong>，让它飘入中心。</p>
        <button class="btn" id="startBtn">🎧 开始守护</button>
        <p style="font-size:10px; margin-top:16px;">🎨 灵感 · 戈登·汉普顿《一平方英寸的寂静》</p>
    </div>
</div>

<div id="endScreen" class="end-screen" style="display: none;">
    <div class="card">
        <h1>🌱 你的寂静指数</h1>
        <p id="endMessage">得分 XX</p>
        <button class="btn" id="restartBtn">🔄 再次守护</button>
        <p id="bookQuote" style="font-style:italic; margin-top:16px; font-size:12px;"></p>
    </div>
</div>

<div class="footer-credit">🎨 自然声请放任飘入 | 噪音请点击拦截</div>

<script>
(function(){
    // ---------- 1. 获取元素 ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ---------- 2. 手机全尺寸适配 ----------
    let canvasWidth, canvasHeight;
    let centerX, centerY, centerRadius;
    let itemSize;
    let moveSpeed;
    const SPAWN_FRAMES = 18;  // 生成频率
    
    function setCanvasSize() {
        // 获取实际可用宽度（减去容器 padding）
        const container = canvas.parentElement;
        let maxWidth = Math.min(window.innerWidth - 24, 500);  // 手机不超500px，保证手指区域
        // 也可以直接取窗口宽度减边距
        let width = window.innerWidth - 24;
        if (width > 500) width = 500;   // 电脑上最大500px，居中
        let height = width * 1.2;        // 高度略宽，适合纵向
        // 防超出屏幕高度
        if (height > window.innerHeight - 80) {
            height = window.innerHeight - 80;
            width = height / 1.2;
        }
        canvas.width = width;
        canvas.height = height;
        canvasWidth = width;
        canvasHeight = height;
        
        // 根据画布大小动态计算所有游戏参数
        centerX = canvasWidth / 2;
        centerY = canvasHeight / 2;
        centerRadius = Math.min(canvasWidth * 0.12, 70);  // 中心圆占宽度12%，上限70
        itemSize = Math.min(canvasWidth * 0.13, 75);      // 图标大小占13%，方便点按
        moveSpeed = canvasWidth / 380;                     // 移动速度与宽度关联，保证横穿时间约1.5秒
        
        console.log(`尺寸: ${canvasWidth}x${canvasHeight}, 图标:${itemSize}, 速度:${moveSpeed}`);
    }
    
    // 监听屏幕旋转，重新设置画布大小并重置游戏界面（如果未开始）
    window.addEventListener('resize', () => {
        if (!gameRunning) {
            setCanvasSize();
            rebuildIcons();   // 重新生成图标适应新尺寸
            drawIdle();
        }
    });
    
    // ---------- 3. 图标生成（基于当前 itemSize 动态绘制，保证清晰）----------
    let naturalIcons = [], noiseIcons = [];
    
    function createEmojiIcon(emoji, bgColor, size) {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = size;
        offCanvas.height = size;
        const offCtx = offCanvas.getContext('2d');
        offCtx.fillStyle = bgColor;
        offCtx.beginPath();
        offCtx.arc(size/2, size/2, size/2 - 4, 0, Math.PI*2);
        offCtx.fill();
        offCtx.fillStyle = 'white';
        offCtx.font = `${size * 0.48}px "Segoe UI Emoji", "Apple Color Emoji"`;
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        offCtx.fillText(emoji, size/2, size/2);
        const img = new Image();
        img.src = offCanvas.toDataURL();
        return img;
    }
    
    function rebuildIcons() {
        const sz = itemSize;
        const emojisNatural = ['🦗','🐸','💧','🐦','🍃'];
        const emojisNoise = ['✈️','📱','🚗','🏗️','🔊'];
        naturalIcons = emojisNatural.map(e => createEmojiIcon(e, '#2e7d32', sz));
        noiseIcons = emojisNoise.map(e => createEmojiIcon(e, '#b71c1c', sz));
    }
    
    function getRandomIcon(isNatural) {
        const arr = isNatural ? naturalIcons : noiseIcons;
        return arr[Math.floor(Math.random() * arr.length)];
    }
    
    // ---------- 4. 游戏状态 ----------
    let gameRunning = false;
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let items = [];
    let spawnCounter = 0;
    
    // 音频
    let audioCtx = null;
    let bgmOsc = null;
    let bgmGain = null;
    let naturalTickInterval = null;
    
    function initAudio() {
        if (!audioCtx && window.AudioContext) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    
    function playDynamicSound(type) {
        if (!audioCtx) initAudio();
        if (!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'natural_success') {
                osc.frequency.value = 880;
                gain.gain.value = 0.25;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc.stop(now + 0.3);
            } else if (type === 'natural_mistake') {
                osc.frequency.value = 330;
                gain.gain.value = 0.2;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                osc.stop(now + 0.25);
            } else if (type === 'noise_hit') {
                osc.frequency.value = 120;
                gain.gain.value = 0.15;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
                osc.stop(now + 0.15);
            } else if (type === 'noise_pollute') {
                osc.frequency.value = 180;
                gain.gain.value = 0.3;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
                osc.stop(now + 0.3);
            }
        } catch(e) {}
    }
    
    function startDynamicBGM() {
        if (!audioCtx) initAudio();
        if (!audioCtx) return;
        stopBGM();
        try {
            bgmOsc = audioCtx.createOscillator();
            bgmGain = audioCtx.createGain();
            bgmOsc.type = 'sine';
            bgmOsc.frequency.value = 100;
            bgmGain.gain.value = 0.05;
            bgmOsc.connect(bgmGain);
            bgmGain.connect(audioCtx.destination);
            bgmOsc.start();
        } catch(e) {}
        
        function scheduleNaturalTick() {
            if (!gameRunning) return;
            let intervalMs = Math.max(800, 3000 - Math.min(2500, Math.abs(score) * 15));
            if (naturalTickInterval) clearTimeout(naturalTickInterval);
            naturalTickInterval = setTimeout(() => {
                if (!gameRunning) return;
                if (audioCtx) {
                    const now = audioCtx.currentTime;
                    const tickOsc = audioCtx.createOscillator();
                    const tickGain = audioCtx.createGain();
                    let freq = 800 + Math.min(600, Math.abs(score) * 5);
                    let vol = 0.04 + Math.min(0.2, Math.abs(score) / 100);
                    tickOsc.frequency.value = freq;
                    tickGain.gain.value = vol;
                    tickOsc.connect(tickGain);
                    tickGain.connect(audioCtx.destination);
                    tickOsc.start();
                    tickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                    tickOsc.stop(now + 0.35);
                }
                scheduleNaturalTick();
            }, intervalMs);
        }
        scheduleNaturalTick();
    }
    
    function stopBGM() {
        if (bgmOsc) { try { bgmOsc.stop(); } catch(e) {} bgmOsc = null; }
        if (naturalTickInterval) { clearTimeout(naturalTickInterval); naturalTickInterval = null; }
    }
    
    // ---------- 物体生成与移动 ----------
    function spawnItem() {
        if (!gameRunning) return;
        const isNatural = Math.random() < 0.6;
        const img = getRandomIcon(isNatural);
        const size = itemSize;
        const edge = Math.floor(Math.random() * 4);
        let x, y;
        if (edge === 0) { x = -size; y = Math.random() * canvasHeight; }
        else if (edge === 1) { x = canvasWidth + size; y = Math.random() * canvasHeight; }
        else if (edge === 2) { x = Math.random() * canvasWidth; y = -size; }
        else { x = Math.random() * canvasWidth; y = canvasHeight + size; }
        let dx = centerX - x, dy = centerY - y;
        const len = Math.hypot(dx, dy);
        if (len < 0.01) return;
        const vx = (dx / len) * moveSpeed;
        const vy = (dy / len) * moveSpeed;
        items.push({ x, y, vx, vy, img, size, type: isNatural ? 'natural' : 'noise' });
    }
    
    function updateItems() {
        for (let i = items.length-1; i >= 0; i--) {
            const it = items[i];
            it.x += it.vx;
            it.y += it.vy;
            // 碰撞中心圆（简单包围盒距离）
            const centerDist = Math.hypot(it.x + it.size/2 - centerX, it.y + it.size/2 - centerY);
            if (centerDist < centerRadius + it.size/2) {
                if (it.type === 'natural') {
                    score++;
                    document.getElementById('scoreValue').innerText = score;
                    playDynamicSound('natural_success');
                    triggerCenterFlash('natural');
                } else {
                    score--;
                    document.getElementById('scoreValue').innerText = score;
                    playDynamicSound('noise_pollute');
                    triggerCenterFlash('noise');
                }
                items.splice(i,1);
                continue;
            }
            // 超出边界移除
            const margin = 200;
            if (it.x + it.size < -margin || it.x - it.size > canvasWidth + margin ||
                it.y + it.size < -margin || it.y - it.size > canvasHeight + margin) {
                items.splice(i,1);
            }
        }
    }
    
    let flashCenter = false;
    let flashColor = '';
    let flashTimer = null;
    function triggerCenterFlash(type) {
        flashCenter = true;
        flashColor = (type === 'natural') ? '#a5d6a5' : '#e67e22';
        if (flashTimer) clearTimeout(flashTimer);
        flashTimer = setTimeout(() => { flashCenter = false; }, 150);
    }
    
    function drawCenter() {
        ctx.beginPath();
        ctx.arc(centerX, centerY, centerRadius, 0, Math.PI*2);
        let fillColor = "#f4e3b1";
        if (flashCenter && flashColor) fillColor = flashColor;
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.strokeStyle = "#c9a87b";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#5d3a1a";
        ctx.font = `bold ${Math.max(14, centerRadius * 0.28)}px "Segoe UI"`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🌿 寂静地", centerX, centerY);
        // 光晕效果
        let glowAlpha = Math.min(0.5, Math.abs(score) / 150);
        ctx.beginPath();
        ctx.arc(centerX, centerY, centerRadius + 6, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 235, 150, ${glowAlpha})`;
        ctx.fill();
    }
    
    function drawItems() {
        for (const it of items) {
            ctx.drawImage(it.img, it.x, it.y, it.size, it.size);
        }
    }
    
    // ---------- 交互 (触摸/鼠标) ----------
    function handleHit(clientX, clientY) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvasWidth / rect.width;
        const scaleY = canvasHeight / rect.height;
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        for (let i = items.length-1; i >= 0; i--) {
            const it = items[i];
            if (canvasX >= it.x && canvasX <= it.x + it.size &&
                canvasY >= it.y && canvasY <= it.y + it.size) {
                if (it.type === 'natural') {
                    score--;
                    document.getElementById('scoreValue').innerText = score;
                    playDynamicSound('natural_mistake');
                    triggerCenterFlash('natural');
                } else {
                    // 点击噪音 = 成功拦截，不扣分不加分
                    playDynamicSound('noise_hit');
                    triggerCenterFlash('noise');
                }
                items.splice(i,1);
                break;
            }
        }
    }
    
    // ---------- 游戏流程 ----------
    function endGame() {
        gameRunning = false;
        if (timerInterval) clearInterval(timerInterval);
        stopBGM();
        const endDiv = document.getElementById('endScreen');
        const msgSpan = document.getElementById('endMessage');
        const quoteSpan = document.getElementById('bookQuote');
        let msg, quote;
        if (score >= 30) { msg = `✨ 寂静守护者 ✨  得分 ${score}`; quote = "「寂静是濒危物种，而你正努力保护它。」—— 戈登·汉普顿"; }
        else if (score >= 15) { msg = `🌱 不错的尝试！得分 ${score}，继续聆听自然吧。`; quote = "「一平方英寸的寂静，足以让灵魂休息。」"; }
        else { msg = `📢 噪音入侵！得分 ${score} ，请重新守护。`; quote = "「我们需要的不仅是保护荒野，更是保护寂静。」"; }
        msgSpan.innerText = msg;
        quoteSpan.innerText = quote;
        endDiv.style.display = "flex";
        cancelAnimationFrame(animationId);
    }
    
    function resetGame() {
        gameRunning = false;
        if (timerInterval) clearInterval(timerInterval);
        score = 0;
        timeLeft = 60;
        items = [];
        document.getElementById('scoreValue').innerText = "0";
        document.getElementById('timerValue').innerText = "60";
    }
    
    let animationId = null;
    function startGameLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        function frame() {
            if (!gameRunning) return;
            updateItems();
            spawnCounter++;
            if (spawnCounter >= SPAWN_FRAMES) {
                spawnCounter = 0;
                spawnItem();
                if (items.length > 38) items.splice(0, 8);
            }
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            drawItems();
            drawCenter();
            animationId = requestAnimationFrame(frame);
        }
        frame();
    }
    
    function launchGame() {
        resetGame();
        gameRunning = true;
        spawnCounter = 0;
        timerInterval = setInterval(() => {
            if (!gameRunning) return;
            if (timeLeft <= 1) {
                timeLeft = 0;
                document.getElementById('timerValue').innerText = "0";
                endGame();
            } else {
                timeLeft--;
                document.getElementById('timerValue').innerText = timeLeft;
            }
        }, 1000);
        startGameLoop();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        startDynamicBGM();
    }
    
    // ---------- UI 事件绑定 ----------
    function attachEvents() {
        canvas.addEventListener('click', (e) => { e.preventDefault(); handleHit(e.clientX, e.clientY); });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (touch) handleHit(touch.clientX, touch.clientY);
        }, { passive: false });
    }
    
    function initUI() {
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const startDiv = document.getElementById('startScreen');
        const endDiv = document.getElementById('endScreen');
        startBtn.addEventListener('click', () => {
            startDiv.style.display = 'none';
            endDiv.style.display = 'none';
            setCanvasSize();       // 重新确保尺寸
            rebuildIcons();
            launchGame();
        });
        restartBtn.addEventListener('click', () => {
            endDiv.style.display = 'none';
            startDiv.style.display = 'none';
            setCanvasSize();
            rebuildIcons();
            launchGame();
        });
    }
    
    function drawIdle() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        drawCenter();
        ctx.fillStyle = "#ffffffcc";
        ctx.font = `bold ${Math.max(16, centerRadius * 0.3)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("点击「开始守护」", centerX, centerY - centerRadius - 12);
    }
    
    // ---------- 初始化 ----------
    function init() {
        setCanvasSize();
        rebuildIcons();
        initAudio();
        attachEvents();
        initUI();
        drawIdle();
        if (audioCtx) audioCtx.suspend();
    }
    
    init();
})();
</script>
</body>
</html>
